                            <div style={{ fontSize:7, color:c?track.color:T.muted, marginTop:2, fontWeight:700 }}>
                              {c?"вң“":u?`${pass}/${lv.skills.length}`:"в–Ә"}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}

      {/* Basic skills row */}
      <div style={{ display:"flex", gap:8 }}>
        {BASIC_GROUPS.map(g=>{
          const pass=basicP[g.id], all=g.skills.length, done=pass===all;
          return (
            <div key={g.id} style={{ flex:1, background:T.surface, borderRadius:10,
              border:`1px solid ${done?g.borderColor:T.border}`, padding:"12px 14px",
              boxShadow:T.cardShadow }}>
              <div style={{ fontSize:20, marginBottom:6 }}>{g.icon}</div>
              <div style={{ fontSize:10, fontWeight:700, color:done?g.color:T.sub, marginBottom:4 }}>{g.name}</div>
              <div style={{ height:3, background:T.locked, borderRadius:2, overflow:"hidden", marginBottom:4 }}>
                <div style={{ width:`${(pass/all)*100}%`, height:"100%",
                  background:done?g.color:T.silver, transition:"width 0.5s" }}/>
              </div>
              <div style={{ fontSize:9, color:done?g.color:T.muted }}>{pass}/{all} passed</div>
            </div>
          );
        })}
      </div>

      {/* Skills Needing Retest */}
      {needsRetest.length > 0 && (
        <div style={{ background:T.surface, borderRadius:10,
                      border:`1.5px solid rgba(220,53,69,0.22)`, padding:"14px 16px",
                      boxShadow:"0 2px 10px rgba(220,53,69,0.07)" }}>
          <div style={{ fontSize:9, color:"#DC3545", letterSpacing:"0.14em", marginBottom:10, fontWeight:700 }}>
            вҡ  SKILLS NEEDING RETEST ({needsRetest.length})
          </div>
          {needsRetest.map(sk => {
            const d = getDecayInfo(viewScores[sk.id]);
            const isFading = d?.status === "fading";
            return (
              <div key={sk.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
                padding:"7px 0", borderBottom:`1px solid ${T.divider}` }}>
                <div>
                  <div style={{ fontSize:11, fontWeight:600, color:T.text }}>{sk.name}</div>
                  <div style={{ fontSize:9, color:T.muted }}>{sk.thai}</div>
                </div>
                <div style={{ textAlign:"right" }}>
                  <div style={{ fontSize:10, fontWeight:700, color:isFading?"#DC3545":"#D07000" }}>
                    {d.badge} {d.days} аё§аёұаёҷаё—аёөа№Ҳа№ҒаёҘа№үаё§
                  </div>
                  {isFading && (
                    <div style={{ fontSize:9, color:"#DC3545" }}>
                      {viewScores[sk.id]?.score||0} вҶ’ {d.effective} pt
                    </div>
                  )}
                  {!isFading && (
                    <div style={{ fontSize:9, color:"#D07000" }}>аёӯаёөаёҒ {d.daysLeft} аё§аёұаёҷаёҲаё°аёҘаё”</div>
                  )}
                </div>
              </div>
            );
          })}
          <div style={{ marginTop:10, fontSize:9, color:T.muted, lineHeight:1.6 }}>
            а№„аёӣаё—аёөа№Ҳа№Ғаё—а№Үаёҡ <b style={{ color:T.gold }}>COACH</b> а№Җаёһаё·а№Ҳаёӯаё—аё”аёӘаёӯаёҡа№ғаё«аёЎа№Ҳа№ҒаёҘаё°аёЈаёөа№ҖаёӢа№Үаё• Timer
          </div>
        </div>
      )}

      {/* Progress chart (only if sessions exist) */}
      {chartData.length > 1 && (
        <div style={{ background:T.surface, borderRadius:10, border:`1px solid ${T.border}`,
                      padding:"16px 18px", boxShadow:T.cardShadow }}>
          <div style={{ fontSize:9, color:T.muted, letterSpacing:"0.14em", marginBottom:14, fontWeight:600 }}>
            MASTERY PROGRESS вҖ” LAST {chartData.length} SESSIONS
          </div>
          <ResponsiveContainer width="100%" height={160}>
            <AreaChart data={chartData} margin={{ top:8, right:8, left:-20, bottom:0 }}>
              <defs>
                <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="5%"  stopColor={T.gold} stopOpacity={0.20}/>
                  <stop offset="95%" stopColor={T.gold} stopOpacity={0}/>
                </linearGradient>
              </defs>
              <CartesianGrid strokeDasharray="3 3" stroke="rgba(0,0,0,0.05)"/>
              <XAxis dataKey="label" tick={{ fontSize:9, fill:T.muted }} axisLine={false} tickLine={false}/>
              <YAxis domain={[0,100]} tick={{ fontSize:9, fill:T.muted }} axisLine={false} tickLine={false}/>
              <Tooltip content={<LightTip/>}/>
              <ReferenceLine y={60} stroke={T.goldGlow} strokeDasharray="4 3"/>
              <Area type="monotone" dataKey="mastery" name="Mastery" stroke={T.gold} strokeWidth={2}
                fill="url(#goldGrad)" dot={{ r:3, fill:T.gold, stroke:T.surface, strokeWidth:2 }}/>
            </AreaChart>
          </ResponsiveContainer>
        </div>
      )}
    </div>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   TAB: SKILLS (read-only skill browser)
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function SkillsTab({ scores, customSkills, headCoachMode, onAddSkill, onDeleteSkill,
                     students, sessions, selectedStudent, onSelectStudent }) {
  const [catId, setCatId]   = useState("basic");  // category id
  const [sub, setSub]       = useState("basic");   // track key within category or "basic"
  const [openB, setOpenB]   = useState("fit");
  const [openLv, setOpenLv] = useState(1);
  const [editMode, setEdit] = useState(false);

  // Use student's last session scores when a student is selected
  const viewStudent = selectedStudent || "";
  const viewScores = viewStudent ? getStudentPrevScores(sessions || [], viewStudent) : scores;
  const selPerson = (students||[]).find(s=>s.name===viewStudent);

  const activeCat = CATEGORIES.find(c=>c.id===catId);
  const catTracks = activeCat ? activeCat.tracks.map(k=>TRACK_CONFIG.find(t=>t.key===k)).filter(Boolean) : [];
  const activeTrack = TRACK_CONFIG.find(t=>t.key===sub);

  const handleCatChange = (cid) => {
    setCatId(cid);
    const cat = CATEGORIES.find(c=>c.id===cid);
    if (cid==="basic") { setSub("basic"); }
    else if (cat && cat.tracks.length > 0) { setSub(cat.tracks[0]); }
    setOpenLv(1);
  };

  return (
    <div style={{ padding:16 }}>

      {/* Student selector bar */}
      {(students||[]).length > 0 && (
        <div style={{ background:T.surface, borderRadius:10, marginBottom:12,
          border:`1px solid ${viewStudent?T.borderGold:T.border}`,
          padding:"10px 14px", boxShadow:T.cardShadow, display:"flex", alignItems:"center", gap:10 }}>
          {selPerson?.avatar ? (
            <div style={{ width:30, height:30, borderRadius:"50%", flexShrink:0, overflow:"hidden",
              border:`1.5px solid ${T.borderGold}` }}>
              <img src={selPerson.avatar} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }}/>
            </div>
          ) : (
            <div style={{ fontSize:9, color:T.muted, fontWeight:700, letterSpacing:"0.10em", whiteSpace:"nowrap" }}>
              в—Ӣ аёҷаёұаёҒа№ҖаёЈаёөаёўаёҷ
            </div>
          )}
          <select value={viewStudent} onChange={e=>onSelectStudent(e.target.value)}
            style={{ flex:1, padding:"7px 10px", borderRadius:6, fontSize:11, fontWeight:600,
              border:`1px solid ${T.borderMd}`, background:T.bg, color:T.text,
              outline:"none", cursor:"pointer", appearance:"auto" }}>
            <option value="">вҖ” аёӣаёұаёҲаёҲаёёаёҡаёұаёҷ (Live) вҖ”</option>
            {(students||[]).map(s=>(<option key={s.id} value={s.name}>{s.name}</option>))}
          </select>
          {viewStudent && (()=>{
            const lastSess = findLastSession(sessions||[], viewStudent);
            return lastSess ? (
              <div style={{ fontSize:8, color:T.gold, fontWeight:600, whiteSpace:"nowrap", textAlign:"right" }}>
                <div>{lastSess.date}</div>
                <div>Mastery {lastSess.mastery}%</div>
              </div>
            ) : (
              <div style={{ fontSize:8, color:T.muted, whiteSpace:"nowrap" }}>аёўаёұаёҮа№„аёЎа№ҲаёЎаёө session</div>
            );
          })()}
        </div>
      )}

      {/* Category selector вҖ” 3-column grid */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:6, marginBottom:10 }}>
        {CATEGORIES.map(cat=>(
          <button key={cat.id} onClick={()=>handleCatChange(cat.id)} style={{
            padding:"10px 6px", borderRadius:8, cursor:"pointer", textAlign:"center",
            background:catId===cat.id?cat.faint:T.surface,
            border:`1.5px solid ${catId===cat.id?cat.border:T.border}`,
            color:catId===cat.id?cat.color:T.muted,
            fontSize:9, fontWeight:700, letterSpacing:"0.04em",
            boxShadow:catId===cat.id?"none":T.cardShadow,
            fontFamily:"inherit", lineHeight:1.4,
          }}>
            <div style={{ fontSize:16, marginBottom:3 }}>{cat.icon}</div>
            {cat.label}
          </button>
        ))}
      </div>

      {/* Sub-track selector within category (grid for tracks) */}
      {catTracks.length > 0 && (
        <div style={{ display:"grid", gridTemplateColumns:`repeat(${Math.min(catTracks.length,3)},1fr)`, gap:5, marginBottom:10 }}>
          {catTracks.map(tk=>(
            <button key={tk.key} onClick={()=>{setSub(tk.key);setOpenLv(1);}} style={{
              padding:"8px 6px", borderRadius:7, cursor:"pointer", textAlign:"center",
              background:sub===tk.key?tk.faint:T.surface,
              border:`1.5px solid ${sub===tk.key?tk.border:T.border}`,
              color:sub===tk.key?tk.color:T.muted,
              fontSize:8, fontWeight:700, letterSpacing:"0.04em",
              boxShadow:sub===tk.key?"none":T.cardShadow,
              fontFamily:"inherit", lineHeight:1.3,
            }}>
              <div style={{ fontSize:14, marginBottom:2 }}>{tk.icon}</div>
              {tk.label}
            </button>
          ))}
        </div>
      )}

      {/* Edit toggle */}
      {headCoachMode&&(
        <div style={{ display:"flex", justifyContent:"flex-end", marginBottom:10 }}>
          <button onClick={()=>setEdit(e=>!e)} style={{
            padding:"7px 13px", borderRadius:8, cursor:"pointer", whiteSpace:"nowrap",
            background:editMode?"rgba(34,165,94,0.12)":T.surface,
            border:`1.5px solid ${editMode?"#22a55e":T.border}`,
            color:editMode?"#22a55e":T.muted,
            fontSize:9, fontWeight:700, letterSpacing:"0.08em", boxShadow:T.cardShadow,
          }}>{editMode?"вңҺ ON":"вңҺ EDIT"}</button>
        </div>
      )}

      {/* Basic category вҖ” show fitness/stretch groups + strength/stretch levels */}
      {catId==="basic" && (
        <>
          <div style={{ padding:"9px 14px", borderRadius:8, marginBottom:12,
            background:T.blueFaint, border:`1px solid ${T.borderBlue}`,
            fontSize:11, color:T.sub, lineHeight:1.7 }}>
            <b style={{ color:T.blue }}>Basic Skills</b> вҖ” аё—аёұаёҒаё©аё°аёһаё·а№үаёҷаёҗаёІаёҷ + аё„аё§аёІаёЎа№ҒаёӮа№ҮаёҮа№ҒаёЈаёҮ + аё„аё§аёІаёЎаёўаё·аё”аё«аёўаёёа№Ҳаёҷ
          </div>
          {BASIC_GROUPS.map(g=>(
            <BasicGroupCard key={g.id} group={g} scores={viewScores} coachMode={false} onScore={()=>{}}
              isOpen={openB===g.id} onToggle={()=>setOpenB(openB===g.id?null:g.id)}
              editMode={editMode} customGroupSkills={(customSkills||{})[g.id]||[]}
              onAddSkill={skill=>onAddSkill&&onAddSkill(g.id, skill)}
              onDeleteSkill={id=>onDeleteSkill&&onDeleteSkill(g.id, id)}
              headCoachMode={headCoachMode}/>
          ))}
          {/* Strength levels inside Basic */}
          {(()=>{
            const stTrack = TRACK_CONFIG.find(t=>t.key==="st");
            if (!stTrack) return null;
            const tUnlocked = calcUnlockedTrack(stTrack.levels, viewScores);
            const tCleared  = calcClearedTrack(stTrack.levels, viewScores);
            return (
              <>
                <div style={{ padding:"9px 14px", borderRadius:8, marginBottom:12, marginTop:8,
                  background:stTrack.faint, border:`1px solid ${stTrack.border}`,
                  fontSize:11, color:T.sub, lineHeight:1.7 }}>
                  <b style={{ color:stTrack.color }}>в—Ҷ STRENGTH Levels</b> вҖ” аё„аё§аёІаёЎа№ҒаёӮа№ҮаёҮа№ҒаёЈаёҮаёӮаёұа№үаёҷаёӘаё№аёҮ 4 Levels
                </div>
                {stTrack.levels.map(lv=>(
                  <HSLevelCard key={`st_${lv.id}`} level={lv} scores={viewScores}
                    unlockedLevels={tUnlocked} clearedLevels={tCleared}
                    coachMode={false} onScore={()=>{}}
                    isOpen={openLv===lv.id && sub==="st"} onToggle={()=>{setSub("st");setOpenLv(openLv===lv.id?null:lv.id);}}
                    editMode={editMode} customLevelSkills={(customSkills||{})[`st_${lv.id}`]||[]}
                    onAddSkill={skill=>onAddSkill&&onAddSkill(`st_${lv.id}`, skill)}
                    onDeleteSkill={id=>onDeleteSkill&&onDeleteSkill(`st_${lv.id}`, id)}
                    headCoachMode={headCoachMode}
                    accentColor={stTrack.color} accentFaint={stTrack.faint}
                    accentGlow={stTrack.glow} accentBorder={stTrack.border}/>
                ))}
              </>
            );
          })()}
          {/* Stretch levels inside Basic */}
          {(()=>{
            const fxTrack = TRACK_CONFIG.find(t=>t.key==="fx");
            if (!fxTrack) return null;
            const tUnlocked = calcUnlockedTrack(fxTrack.levels, viewScores);
            const tCleared  = calcClearedTrack(fxTrack.levels, viewScores);
            return (
              <>
                <div style={{ padding:"9px 14px", borderRadius:8, marginBottom:12, marginTop:8,
                  background:fxTrack.faint, border:`1px solid ${fxTrack.border}`,
                  fontSize:11, color:T.sub, lineHeight:1.7 }}>
                  <b style={{ color:fxTrack.color }}>вүӢ STRETCH Levels</b> вҖ” аё„аё§аёІаёЎаёўаё·аё”аё«аёўаёёа№ҲаёҷаёӮаёұа№үаёҷаёӘаё№аёҮ 4 Levels
                </div>
                {fxTrack.levels.map(lv=>(
                  <HSLevelCard key={`fx_${lv.id}`} level={lv} scores={viewScores}
                    unlockedLevels={tUnlocked} clearedLevels={tCleared}
                    coachMode={false} onScore={()=>{}}
                    isOpen={openLv===lv.id && sub==="fx"} onToggle={()=>{setSub("fx");setOpenLv(openLv===lv.id?null:lv.id);}}
                    editMode={editMode} customLevelSkills={(customSkills||{})[`fx_${lv.id}`]||[]}
                    onAddSkill={skill=>onAddSkill&&onAddSkill(`fx_${lv.id}`, skill)}
                    onDeleteSkill={id=>onDeleteSkill&&onDeleteSkill(`fx_${lv.id}`, id)}
                    headCoachMode={headCoachMode}
                    accentColor={fxTrack.color} accentFaint={fxTrack.faint}
                    accentGlow={fxTrack.glow} accentBorder={fxTrack.border}/>
                ))}
              </>
            );
          })()}
        </>
      )}

      {/* Floor/Pole and Aerial categories вҖ” show selected track levels */}
      {catId!=="basic" && activeTrack && (()=>{
        const tUnlocked = calcUnlockedTrack(activeTrack.levels, viewScores);
        const tCleared  = calcClearedTrack(activeTrack.levels, viewScores);
        return (
          <>
            <div style={{ padding:"9px 14px", borderRadius:8, marginBottom:12,
              background:activeTrack.faint, border:`1px solid ${activeTrack.border}`,
              fontSize:11, color:T.sub, lineHeight:1.7 }}>
              <b style={{ color:activeTrack.color }}>{activeTrack.icon} {activeTrack.label} Skills</b> вҖ” {activeTrack.levels.length} Levels В· вүҘ 6/10 аё—аёёаёҒ skill а№Җаёһаё·а№ҲаёӯаёӣаёҘаё”аёҘа№Үаёӯаё„ Level аё–аёұаё”а№„аёӣ
            </div>
            {activeTrack.levels.map(lv=>(
              <HSLevelCard key={`${activeTrack.key}_${lv.id}`} level={lv} scores={viewScores}
                unlockedLevels={tUnlocked} clearedLevels={tCleared}
                coachMode={false} onScore={()=>{}}
                isOpen={openLv===lv.id} onToggle={()=>setOpenLv(openLv===lv.id?null:lv.id)}
                editMode={editMode} customLevelSkills={(customSkills||{})[`${activeTrack.key}_${lv.id}`]||[]}
                onAddSkill={skill=>onAddSkill&&onAddSkill(`${activeTrack.key}_${lv.id}`, skill)}
                onDeleteSkill={id=>onDeleteSkill&&onDeleteSkill(`${activeTrack.key}_${lv.id}`, id)}
                headCoachMode={headCoachMode}
                accentColor={activeTrack.color} accentFaint={activeTrack.faint}
                accentGlow={activeTrack.glow} accentBorder={activeTrack.border}/>
            ))}
          </>
        );
      })()}
    </div>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   EXERCISE PICKER  (overlay вҖ” pick from all skill groups + custom exercises)
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
/* All groups available in the picker (Basic + HS levels) */
const PICKER_GROUPS = [
  ...BASIC_GROUPS.map(g => ({ id:g.id,       icon:g.icon, name:g.name,             thai:g.thai, color:g.color, skills:g.skills })),
  ...HS_LEVELS.map(lv =>     ({ id:`hs_${lv.id}`, icon:lv.icon, name:`HOYHON Lv${lv.id} В· ${lv.name}`,      thai:lv.thai, color:T.gold,    skills:lv.skills })),
  ...AS_LEVELS.map(lv =>     ({ id:`as_${lv.id}`, icon:lv.icon, name:`AS Lv${lv.id} В· ${lv.name}`,      thai:lv.thai, color:T.purple,  skills:lv.skills })),
  ...HOOP_LEVELS.map(lv =>   ({ id:`hp_${lv.id}`, icon:lv.icon, name:`Hoop Lv${lv.id} В· ${lv.name}`,    thai:lv.thai, color:T.rose,    skills:lv.skills })),
  ...SILK_LEVELS.map(lv =>   ({ id:`sk_${lv.id}`, icon:lv.icon, name:`Silk Lv${lv.id} В· ${lv.name}`,    thai:lv.thai, color:T.crimson, skills:lv.skills })),
  ...HAMMOCK_LEVELS.map(lv =>({ id:`hm_${lv.id}`, icon:lv.icon, name:`Hammock Lv${lv.id} В· ${lv.name}`, thai:lv.thai, color:T.teal,    skills:lv.skills })),
  ...ROPE_LEVELS.map(lv =>   ({ id:`rp_${lv.id}`, icon:lv.icon, name:`Rope Lv${lv.id} В· ${lv.name}`,    thai:lv.thai, color:T.amber,   skills:lv.skills })),
  ...STR_LEVELS.map(lv =>    ({ id:`st_${lv.id}`, icon:lv.icon, name:`Str Lv${lv.id} В· ${lv.name}`,     thai:lv.thai, color:T.steel,   skills:lv.skills })),
  ...FLEX_LEVELS.map(lv =>   ({ id:`fx_${lv.id}`, icon:lv.icon, name:`Flex Lv${lv.id} В· ${lv.name}`,    thai:lv.thai, color:T.sage,    skills:lv.skills })),
  ...POLE_LEVELS.map(lv =>   ({ id:`pl_${lv.id}`, icon:lv.icon, name:`Pole Lv${lv.id} В· ${lv.name}`,    thai:lv.thai, color:T.indigo,  skills:lv.skills })),
];

function ExercisePicker({ onAdd, onClose, customExercises, onAddCustom }) {
  const [openGrp, setOpenGrp]   = useState(null);
  const [newExForm, setNewExForm] = useState(null); // { groupId, name, sets, useReps, value }

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(30,26,23,0.55)", zIndex:500,
                  display:"flex", flexDirection:"column", justifyContent:"flex-end",
                  backdropFilter:"blur(2px)" }}>
      <div style={{ background:T.bg, borderRadius:"14px 14px 0 0", maxHeight:"82vh",
                    display:"flex", flexDirection:"column",
                    boxShadow:"0 -4px 24px rgba(0,0,0,0.14)" }}>
        {/* Header */}
        <div style={{ padding:"14px 16px 10px", display:"flex", alignItems:"center",
                      justifyContent:"space-between", borderBottom:`1px solid ${T.border}`, flexShrink:0 }}>
          <div>
            <div style={{ fontSize:13, fontWeight:800, color:T.text }}>а№Җаёһаёҙа№ҲаёЎ Exercise</div>
            <div style={{ fontSize:9, color:T.muted, marginTop:2 }}>а№ҖаёҘаё·аёӯаёҒаёҲаёІаёҒ Skill Groups аё«аёЈаё·аёӯаёӘаёЈа№үаёІаёҮа№ғаё«аёЎа№Ҳ</div>
          </div>
          <button onClick={onClose} style={{ ...btnBase, width:30, height:30, fontSize:15, color:T.muted }}>вң•</button>
        </div>

        {/* Scrollable group list */}
        <div style={{ overflowY:"auto", flex:1, paddingBottom:20 }}>
          {PICKER_GROUPS.map(grp => {
            const customs  = customExercises[grp.id] || [];
            const isOpen   = openGrp === grp.id;
            const totalEx  = grp.skills.length + customs.length;
            const isNewHere = newExForm?.groupId === grp.id;
            return (
              <div key={grp.id} style={{ borderBottom:`1px solid ${T.divider}` }}>
                {/* Group header */}
                <div onClick={()=>setOpenGrp(isOpen ? null : grp.id)}
                  style={{ display:"flex", alignItems:"center", gap:10, padding:"11px 16px",
                           cursor:"pointer", background:isOpen?T.surfaceHi:T.surface, userSelect:"none" }}>
                  <span style={{ fontSize:16 }}>{grp.icon}</span>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:11, fontWeight:700, color:T.text }}>{grp.name}</div>
                    <div style={{ fontSize:9, color:T.muted }}>{grp.thai} В· {totalEx} exercises</div>
                  </div>
                  {customs.length > 0 && (
                    <span style={{ fontSize:8, padding:"1px 6px", borderRadius:99, fontWeight:700,
                      background:T.greenFaint, color:T.green, border:`1px solid ${T.borderGreen}` }}>
                      +{customs.length} custom
                    </span>
                  )}
                  <span style={{ fontSize:10, color:T.muted }}>{isOpen?"в–І":"в–ј"}</span>
                </div>

                {isOpen && (
                  <div style={{ background:T.faint }}>
                    {/* в”Җв”Җ Predefined skills в”Җв”Җ */}
                    {grp.skills.map(sk => {
                      const defReps = guessUsesReps(sk);
                      return (
                        <div key={sk.id} style={{ display:"flex", alignItems:"center", gap:10,
                          padding:"9px 14px 9px 38px", borderBottom:`1px solid ${T.divider}` }}>
                          <div style={{ flex:1, minWidth:0 }}>
                            <div style={{ fontSize:11, fontWeight:600, color:T.text,
                              overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{sk.name}</div>
                            <div style={{ fontSize:9, color:T.muted }}>{sk.thai}</div>
                          </div>
                          <button onClick={()=>onAdd({ id:uid(), name:sk.name, sets:3,
                            useReps:defReps, value:defReps?10:20 })}
                            style={{ ...btnBase, padding:"5px 11px", fontSize:10, fontWeight:700,
                              color:T.gold, borderColor:T.borderGold, background:T.goldFaint,
                              whiteSpace:"nowrap", flexShrink:0 }}>+ Add</button>
                        </div>
                      );
                    })}

                    {/* в”Җв”Җ Custom exercises in this group в”Җв”Җ */}
                    {customs.map(cx => (
                      <div key={cx.id} style={{ display:"flex", alignItems:"center", gap:10,
                        padding:"9px 14px 9px 38px", borderBottom:`1px solid ${T.divider}`,
                        background:"rgba(100,160,122,0.05)" }}>
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                            <span style={{ fontSize:8, padding:"1px 5px", borderRadius:3, fontWeight:700,
                              background:T.greenFaint, color:T.green, border:`1px solid ${T.borderGreen}`,
                              flexShrink:0 }}>Custom</span>
                            <span style={{ fontSize:11, fontWeight:600, color:T.text,
                              overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{cx.name}</span>
                          </div>
                          <div style={{ fontSize:9, color:T.muted, marginTop:1 }}>
                            default {cx.sets}Г—{cx.value}{cx.useReps?"аё„аёЈаёұа№үаёҮ":"аё§аёҙ"}
                          </div>
                        </div>
                        <button onClick={()=>onAdd({ id:uid(), name:cx.name, sets:cx.sets,
                          useReps:cx.useReps, value:cx.value })}
                          style={{ ...btnBase, padding:"5px 11px", fontSize:10, fontWeight:700,
                            color:T.gold, borderColor:T.borderGold, background:T.goldFaint,
                            whiteSpace:"nowrap", flexShrink:0 }}>+ Add</button>
                      </div>
                    ))}

                    {/* в”Җв”Җ New custom exercise form в”Җв”Җ */}
                    {isNewHere ? (
                      <div style={{ padding:"12px 14px 12px 38px",
                        background:"rgba(100,160,122,0.06)", borderTop:`1px solid ${T.borderGreen}` }}>
                        <div style={{ fontSize:8, color:T.green, fontWeight:700, letterSpacing:"0.10em",
                          marginBottom:8 }}>+ NEW CUSTOM EXERCISE IN {grp.name.toUpperCase()}</div>
                        <input value={newExForm.name}
                          onChange={e=>setNewExForm(f=>({...f,name:e.target.value}))}
                          placeholder="аёҠаё·а№Ҳаёӯ exercise а№ғаё«аёЎа№ҲвҖҰ"
                          style={{ width:"100%", padding:"7px 10px", boxSizing:"border-box", marginBottom:8,
                            background:T.bg, border:`1px solid ${T.borderMd}`,
                            borderRadius:6, color:T.text, fontSize:11, outline:"none", fontFamily:"inherit" }}/>
                        <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap", marginBottom:10 }}>
                          <div style={{ display:"flex", gap:4 }}>
                            {[{v:true,label:"Reps"},{v:false,label:"Secs"}].map(m=>(
                              <button key={String(m.v)} onClick={()=>setNewExForm(f=>({...f,useReps:m.v}))} style={{
                                padding:"4px 8px", borderRadius:5, cursor:"pointer", fontSize:9, fontWeight:600,
                                background:newExForm.useReps===m.v?T.goldFaint:T.surface,
                                border:`1px solid ${newExForm.useReps===m.v?T.borderGold:T.border}`,
                                color:newExForm.useReps===m.v?T.gold:T.muted }}>{m.label}</button>
                            ))}
                          </div>
                          <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                            <span style={{ fontSize:9, color:T.muted }}>Sets</span>
                            <Stepper value={newExForm.sets}
                              onChange={v=>setNewExForm(f=>({...f,sets:Math.max(1,v)}))} min={1} max={20}/>
                          </div>
                          <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                            <span style={{ fontSize:9, color:T.muted }}>Min</span>
                            <Stepper value={newExForm.value}
                              onChange={v=>setNewExForm(f=>({...f,value:Math.max(0,v)}))}
                              min={0} max={9999} suffix={newExForm.useReps?" аё„аёЈаёұа№үаёҮ":" аё§аёҙ"}/>
                          </div>
                        </div>
                        <div style={{ display:"flex", gap:6 }}>
                          <button disabled={!newExForm.name.trim()} onClick={()=>{
                            if (!newExForm.name.trim()) return;
                            const cx = { id:uid(), name:newExForm.name.trim(), sets:newExForm.sets,
                              useReps:newExForm.useReps, value:newExForm.value };
                            onAddCustom(grp.id, cx);
                            onAdd({ id:uid(), name:cx.name, sets:cx.sets, useReps:cx.useReps, value:cx.value });
                            setNewExForm(null);
                          }} style={{ flex:1, padding:"8px", borderRadius:6, cursor:"pointer", fontSize:10,
                            fontWeight:700, border:"none",
                            background:newExForm.name.trim()?`linear-gradient(135deg,${T.green} 0%,#7DC49A 100%)`:"#DDD",
                            color:newExForm.name.trim()?"#FFF":T.muted }}>
                            аёҡаёұаёҷаё—аё¶аёҒ &amp; а№ғаёӘа№Ҳа№ғаёҷ Program
                          </button>
                          <button onClick={()=>setNewExForm(null)} style={{ padding:"8px 13px",
                            borderRadius:6, background:T.surface, border:`1px solid ${T.border}`,
                            color:T.muted, fontSize:10, cursor:"pointer" }}>аёўаёҒа№ҖаёҘаёҙаёҒ</button>
                        </div>
                      </div>
                    ) : (
                      <button onClick={()=>setNewExForm({ groupId:grp.id, name:"", sets:3, useReps:true, value:10 })}
                        style={{ width:"100%", padding:"9px 14px 9px 38px", textAlign:"left",
                          background:"none", border:"none", borderTop:`1px solid ${T.divider}`,
                          cursor:"pointer", fontSize:10, color:T.green, fontWeight:600, fontFamily:"inherit" }}>
                        пјӢ а№Җаёһаёҙа№ҲаёЎ exercise а№ғаё«аёЎа№Ҳа№ғаёҷ {grp.name}
                      </button>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   PROGRAM MANAGER  (Programs mode in Coach)
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function ProgramManager({ programs, onPrograms, customExercises, onCustomExercises }) {
  const [editing, setEditing]       = useState(null); // null=list, "new"=create, id=edit
  const [form, setForm]             = useState({ name:"", exercises:[] });
  const [showPicker, setShowPicker] = useState(false);
  const [editingExIdx, setEditingExIdx] = useState(null); // index of exercise being inline-edited

  const startNew  = () => { setForm({ name:"", exercises:[] }); setEditing("new"); setEditingExIdx(null); };
  const startEdit = (prog) => { setForm({ name:prog.name, exercises:prog.exercises.map(e=>({...e})) }); setEditing(prog.id); setEditingExIdx(null); };
  const saveForm  = () => {
    if (!form.name.trim()) return;
    if (editing === "new") {
      onPrograms([...programs, { id:uid(), name:form.name.trim(), exercises:form.exercises }]);
    } else {
      onPrograms(programs.map(p => p.id===editing ? { ...p, name:form.name.trim(), exercises:form.exercises } : p));
    }
    setEditing(null);
  };
  const deleteProgram  = (id)  => onPrograms(programs.filter(p => p.id !== id));
  const addExToForm    = (ex)  => { setForm(f=>({...f, exercises:[...f.exercises, ex]})); setShowPicker(false); };
  const updEx          = (idx, patch) => setForm(f=>({...f, exercises:f.exercises.map((e,i)=>i===idx?{...e,...patch}:e)}));
  const remEx          = (idx) => { setForm(f=>({...f, exercises:f.exercises.filter((_,i)=>i!==idx)})); if(editingExIdx===idx) setEditingExIdx(null); };
  const moveEx         = (idx, dir) => {
    const arr  = [...form.exercises];
    const swap = idx + dir;
    if (swap < 0 || swap >= arr.length) return;
    [arr[idx], arr[swap]] = [arr[swap], arr[idx]];
    setForm(f=>({...f, exercises:arr}));
    if (editingExIdx === idx) setEditingExIdx(swap);
  };
  const handleAddCustom = (groupId, cx) => {
    const prev = customExercises[groupId] || [];
    onCustomExercises({ ...customExercises, [groupId]: [...prev, cx] });
  };

  /* в”Җв”Җ EDIT / CREATE FORM в”Җв”Җ */
  if (editing !== null) return (
    <div style={{ padding:16 }}>
      {showPicker && (
        <ExercisePicker onAdd={addExToForm} onClose={()=>setShowPicker(false)}
          customExercises={customExercises} onAddCustom={handleAddCustom}/>
      )}

      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
        <button onClick={()=>setEditing(null)} style={{ ...btnBase, padding:"6px 11px", fontSize:11, color:T.muted }}>вҶҗ Back</button>
        <div style={{ fontSize:12, fontWeight:700, color:T.text }}>
          {editing==="new" ? "Create Program" : "Edit Program"}
        </div>
      </div>

      {/* Program name */}
      <div style={{ marginBottom:14 }}>
        <div style={{ fontSize:8, color:T.muted, letterSpacing:"0.10em", marginBottom:6, fontWeight:700 }}>PROGRAM NAME</div>
        <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}
          placeholder="а№ҖаёҠа№Ҳаёҷ Handstand Beginner, Core & Flex"
          style={{ width:"100%", padding:"9px 12px", boxSizing:"border-box",
            background:T.bg, border:`1px solid ${T.borderMd}`,
            borderRadius:6, color:T.text, fontSize:12, outline:"none", fontFamily:"inherit" }}/>
      </div>

      {/* Exercise list header */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
        <div style={{ fontSize:8, color:T.muted, letterSpacing:"0.10em", fontWeight:700 }}>
          EXERCISES ({form.exercises.length})
        </div>
        <div style={{ fontSize:8, color:T.muted }}>вҶ‘вҶ“ а№ҖаёЈаёөаёўаёҮ В· вңҺ а№ҒаёҒа№ү В· вң• аёҘаёҡ</div>
      </div>

      {form.exercises.length === 0 && (
        <div style={{ fontSize:11, color:T.muted, textAlign:"center", padding:"18px 0", marginBottom:8,
          background:T.surface, borderRadius:8, border:`1px dashed ${T.borderMd}` }}>
          аёҒаё” "а№Җаёһаёҙа№ҲаёЎ Exercise" аё”а№үаёІаёҷаёҘа№ҲаёІаёҮа№Җаёһаё·а№Ҳаёӯа№ҖаёҘаё·аёӯаёҒаёҲаёІаёҒ Skill Groups
        </div>
      )}

      {/* Exercise rows */}
      {form.exercises.map((ex, idx) => {
        const isInlineEdit = editingExIdx === idx;
        const isLast = idx === form.exercises.length - 1;
        return (
          <div key={ex.id} style={{ background:T.surface, border:`1px solid ${isInlineEdit?T.borderGold:T.border}`,
                                     borderRadius:8, padding:isInlineEdit?"12px 12px":"8px 12px",
                                     marginBottom:7, boxShadow:T.cardShadow,
                                     transition:"border-color 0.2s" }}>
            {isInlineEdit ? (
              /* в”Җв”Җ Inline edit expanded в”Җв”Җ */
              <div>
                <input value={ex.name} onChange={e=>updEx(idx,{name:e.target.value})}
                  style={{ width:"100%", padding:"7px 10px", boxSizing:"border-box", marginBottom:10,
                    background:T.bg, border:`1px solid ${T.borderMd}`,
                    borderRadius:6, color:T.text, fontSize:11, outline:"none", fontFamily:"inherit" }}/>
                <div style={{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center", marginBottom:10 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                    <span style={{ fontSize:9, color:T.muted }}>Sets</span>
                    <Stepper value={ex.sets} onChange={v=>updEx(idx,{sets:Math.max(1,v)})} min={1} max={20}/>
                  </div>
                  <div style={{ display:"flex", gap:4 }}>
                    {[{v:true,label:"Reps"},{v:false,label:"Secs"}].map(m=>(
                      <button key={String(m.v)} onClick={()=>updEx(idx,{useReps:m.v})} style={{
                        padding:"4px 9px", borderRadius:5, cursor:"pointer", fontSize:9, fontWeight:600,
                        background:ex.useReps===m.v?T.goldFaint:T.surface,
                        border:`1px solid ${ex.useReps===m.v?T.borderGold:T.border}`,
                        color:ex.useReps===m.v?T.gold:T.muted }}>{m.label}</button>
                    ))}
                  </div>
                  <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                    <span style={{ fontSize:9, color:T.muted }}>Min</span>
                    <Stepper value={ex.value} onChange={v=>updEx(idx,{value:Math.max(0,v)})}
                      min={0} max={9999} suffix={ex.useReps?" аё„аёЈаёұа№үаёҮ":" аё§аёҙ"}/>
                  </div>
                </div>
                <button onClick={()=>setEditingExIdx(null)} style={{ width:"100%", padding:"7px",
                  borderRadius:6, background:T.goldFaint, border:`1px solid ${T.borderGold}`,
                  color:T.gold, fontSize:10, fontWeight:700, cursor:"pointer" }}>вң“ Done</button>
              </div>
            ) : (
              /* в”Җв”Җ Collapsed row в”Җв”Җ */
              <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                {/* Reorder */}
                <div style={{ display:"flex", flexDirection:"column", gap:2, flexShrink:0 }}>
                  <button onClick={()=>moveEx(idx,-1)} disabled={idx===0}
                    style={{ ...btnBase, width:20, height:16, fontSize:9,
                      color:idx===0?T.lockedTxt:T.muted, opacity:idx===0?0.35:1 }}>вҶ‘</button>
                  <button onClick={()=>moveEx(idx,1)} disabled={isLast}
                    style={{ ...btnBase, width:20, height:16, fontSize:9,
                      color:isLast?T.lockedTxt:T.muted, opacity:isLast?0.35:1 }}>вҶ“</button>
                </div>
                {/* Number badge */}
                <div style={{ width:18, height:18, borderRadius:"50%", background:T.faint,
                  border:`1px solid ${T.border}`, display:"flex", alignItems:"center",
                  justifyContent:"center", fontSize:8, fontWeight:700, color:T.muted, flexShrink:0 }}>{idx+1}</div>
                {/* Name + detail */}
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:11, fontWeight:600, color:T.text,
                    overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{ex.name||"вҖ”"}</div>
                  <div style={{ fontSize:9, color:T.muted }}>{ex.sets}Г—{ex.value}{ex.useReps?"аё„аёЈаёұа№үаёҮ":"аё§аёҙ"}</div>
                </div>
                {/* Edit */}
                <button onClick={()=>setEditingExIdx(idx)} style={{ ...btnBase, width:26, height:26,
                  fontSize:11, color:T.blue, borderColor:T.borderBlue }}>вңҺ</button>
                {/* Delete */}
                <button onClick={()=>remEx(idx)} style={{ ...btnBase, width:26, height:26,
                  fontSize:11, color:"#DC3545", borderColor:"rgba(220,53,69,0.25)" }}>вң•</button>
              </div>
            )}
          </div>
        );
      })}

      {/* Add from skill groups picker */}
      <button onClick={()=>setShowPicker(true)} style={{ width:"100%", padding:"11px", borderRadius:7,
        background:T.surface, border:`1.5px dashed ${T.borderGold}`,
        color:T.gold, fontSize:11, cursor:"pointer", marginBottom:10, fontWeight:700 }}>
        в–Ј  а№Җаёһаёҙа№ҲаёЎ Exercise аёҲаёІаёҒ Skill Groups
      </button>

      {/* Save program */}
      <button onClick={saveForm} disabled={!form.name.trim()} style={{ width:"100%", padding:"12px",
        background:form.name.trim()?`linear-gradient(135deg,${T.gold} 0%,${T.goldBright} 100%)`:"#E5E5E5",
        border:"none", borderRadius:8, color:form.name.trim()?"#FFF":T.muted,
        fontWeight:700, fontSize:12, cursor:form.name.trim()?"pointer":"default",
        letterSpacing:"0.08em", boxShadow:form.name.trim()?"0 2px 8px rgba(184,126,106,0.25)":"none" }}>
        вңҰ  Save Program
      </button>
    </div>
  );

  /* в”Җв”Җ PROGRAM LIST в”Җв”Җ */
  return (
    <div style={{ padding:16 }}>
      <div style={{ fontSize:9, color:T.muted, letterSpacing:"0.12em", marginBottom:12, fontWeight:600 }}>
        CLASS PROGRAMS ({programs.length})
      </div>
      {programs.length === 0 && (
        <div style={{ background:T.surface, borderRadius:10, border:`1px solid ${T.border}`,
          padding:"28px 20px", textAlign:"center", boxShadow:T.cardShadow, marginBottom:12 }}>
          <div style={{ fontSize:28, marginBottom:10 }}>в–Ј</div>
          <div style={{ fontSize:12, fontWeight:700, color:T.sub, marginBottom:6 }}>аёўаёұаёҮа№„аёЎа№ҲаёЎаёө Program</div>
          <div style={{ fontSize:11, color:T.muted, lineHeight:1.6 }}>
            аёӘаёЈа№үаёІаёҮ Program аёӘаёіаё«аёЈаёұаёҡ Group Class<br/>а№ҖаёҠа№Ҳаёҷ "Handstand Beginner", "Core &amp; Flex"
          </div>
        </div>
      )}
      {programs.map(prog => (
        <div key={prog.id} style={{ background:T.surface, border:`1px solid ${T.border}`,
          borderRadius:10, padding:"13px 15px", marginBottom:10, boxShadow:T.cardShadow }}>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:prog.exercises.length?6:0 }}>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:12, fontWeight:700, color:T.text }}>{prog.name}</div>
              <div style={{ fontSize:9, color:T.muted, marginTop:2 }}>{prog.exercises.length} exercises</div>
            </div>
            <button onClick={()=>startEdit(prog)} style={{ ...btnBase, padding:"5px 10px",
              fontSize:10, color:T.gold, borderColor:T.borderGold }}>вңҺ Edit</button>
            <button onClick={()=>deleteProgram(prog.id)} style={{ ...btnBase, width:28, height:28,
              fontSize:11, color:"#DC3545", borderColor:"rgba(220,53,69,0.25)" }}>вң•</button>
          </div>
          {prog.exercises.length > 0 && (
            <div style={{ display:"flex", flexDirection:"column", gap:3 }}>
              {prog.exercises.map((ex, i) => (
                <div key={ex.id||i} style={{ display:"flex", alignItems:"center", gap:6,
                  padding:"4px 8px", background:T.faint, borderRadius:5, border:`1px solid ${T.border}` }}>
                  <span style={{ fontSize:9, color:T.muted, fontWeight:700, minWidth:14 }}>{i+1}.</span>
                  <span style={{ flex:1, fontSize:10, color:T.sub, fontWeight:600 }}>{ex.name||"вҖ”"}</span>
                  <span style={{ fontSize:9, color:T.muted }}>{ex.sets}Г—{ex.value}{ex.useReps?"r":"s"}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      ))}
      <button onClick={startNew} style={{ width:"100%", padding:"12px",
        background:`linear-gradient(135deg,${T.gold} 0%,${T.goldBright} 100%)`,
        border:"none", borderRadius:8, color:"#FFF",
        fontWeight:700, fontSize:12, cursor:"pointer",
        letterSpacing:"0.08em", boxShadow:"0 2px 8px rgba(184,126,106,0.25)" }}>
        + Create New Program
      </button>
    </div>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   GROUP LOGGER  (Group mode in Coach)
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function GroupLogger({ programs, coachName, onCoachNameChange, onSaveGroup }) {
  const [selectedProg, setSelectedProg] = useState(programs[0]?.id || "");
  const [date, setDate] = useState(today());
  const [note, setNote] = useState("");

  useEffect(() => {
    if (!selectedProg && programs.length > 0) setSelectedProg(programs[0].id);
  }, [programs]);

  const prog = programs.find(p => p.id === selectedProg);
  const handleSave = () => {
    if (!prog) return;
    onSaveGroup({ date, note:note.trim(), coachName, progId:prog.id, progName:prog.name, exercises:prog.exercises });
    setNote("");
    setDate(today());
  };

  if (programs.length === 0) return (
    <div style={{ padding:32, textAlign:"center" }}>
      <div style={{ fontSize:32, marginBottom:12 }}>в–Ј</div>
      <div style={{ fontSize:13, fontWeight:700, color:T.sub, marginBottom:8 }}>аёўаёұаёҮа№„аёЎа№ҲаёЎаёө Program</div>
      <div style={{ fontSize:11, color:T.muted, lineHeight:1.7 }}>
        а№„аёӣаё—аёөа№Ҳа№Ӯаё«аёЎаё” <b style={{ color:T.gold }}>в–Ј Programs</b> а№Җаёһаё·а№ҲаёӯаёӘаёЈа№үаёІаёҮ Program аёҒа№Ҳаёӯаёҷ
      </div>
    </div>
  );

  return (
    <div style={{ padding:16, display:"flex", flexDirection:"column", gap:12 }}>
      {/* Coach */}
      <div style={{ background:T.surface, borderRadius:10, border:`1px solid ${T.border}`,
                    padding:"14px 16px", boxShadow:T.cardShadow }}>
        <div style={{ fontSize:8, color:T.muted, letterSpacing:"0.12em", marginBottom:6, fontWeight:700 }}>
          в—Ҳ  COACH
        </div>
        <input value={coachName} onChange={e=>onCoachNameChange(e.target.value)}
          placeholder="аёҠаё·а№Ҳаёӯ Coach"
          style={{ width:"100%", padding:"9px 10px", boxSizing:"border-box",
            background:T.bg, border:`1px solid ${T.borderMd}`,
            borderRadius:6, color:T.text, fontSize:12, outline:"none", fontFamily:"inherit" }}/>
      </div>

      {/* Select program */}
      <div style={{ background:T.surface, borderRadius:10, border:`1px solid ${T.border}`,
                    padding:"14px 16px", boxShadow:T.cardShadow }}>
        <div style={{ fontSize:8, color:T.muted, letterSpacing:"0.12em", marginBottom:8, fontWeight:700 }}>
          SELECT PROGRAM
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
          {programs.map(p => (
            <button key={p.id} onClick={()=>setSelectedProg(p.id)} style={{
              padding:"10px 12px", borderRadius:7, cursor:"pointer", textAlign:"left",
              background:selectedProg===p.id?T.goldFaint:T.bg,
              border:`1.5px solid ${selectedProg===p.id?T.borderGold:T.border}`,
              color:selectedProg===p.id?T.gold:T.text,
              fontFamily:"inherit", fontSize:12,
              boxShadow:selectedProg===p.id?"none":T.cardShadow }}>
              <b>{p.name}</b>
              <span style={{ fontSize:9, color:T.muted, marginLeft:8 }}>{p.exercises.length} exercises</span>
            </button>
          ))}
        </div>
      </div>

      {/* Program preview */}
      {prog && (
        <div style={{ background:T.surface, borderRadius:10, border:`1px solid ${T.borderGold}`,
                      padding:"14px 16px", boxShadow:T.cardShadow }}>
          <div style={{ fontSize:8, color:T.gold, letterSpacing:"0.12em", marginBottom:10, fontWeight:700 }}>
            в–Ј  {prog.name.toUpperCase()} вҖ” EXERCISES
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
            {prog.exercises.map((ex, i) => (
              <div key={ex.id} style={{ display:"flex", alignItems:"center", gap:8,
                padding:"7px 10px", background:T.bg, borderRadius:6, border:`1px solid ${T.border}` }}>
                <span style={{ fontSize:9, color:T.muted, fontWeight:700, minWidth:16 }}>{i+1}</span>
                <span style={{ flex:1, fontSize:11, color:T.text, fontWeight:600 }}>{ex.name||"вҖ”"}</span>
                <span style={{ fontSize:9, color:T.sub, fontWeight:600 }}>
                  {ex.sets}Г—{ex.value}{ex.useReps?"аё„аёЈаёұа№үаёҮ":"аё§аёҙ"}
                </span>
              </div>
            ))}
          </div>
          <div style={{ marginTop:8, padding:"6px 10px", borderRadius:5,
            background:T.faint, border:`1px solid ${T.border}`,
            fontSize:9, color:T.muted, lineHeight:1.6 }}>
            Group class вҖ” аёҡаёұаёҷаё—аё¶аёҒа№ҖаёүаёһаёІаё° program аё—аёөа№Ҳаё—аёі В· а№„аёЎа№ҲаёЎаёөаёҒаёІаёЈа№ғаё«а№үаё„аё°а№Ғаёҷаёҷ Form
          </div>
        </div>
      )}

      {/* Log section */}
      <div style={{ background:T.surface, borderRadius:10, border:`1px solid ${T.border}`,
                    padding:"16px", boxShadow:T.cardShadow }}>
        <div style={{ fontSize:9, color:T.muted, letterSpacing:"0.14em", marginBottom:12, fontWeight:600 }}>
          LOG GROUP SESSION
        </div>
        <div style={{ marginBottom:10 }}>
          <div style={{ fontSize:9, color:T.muted, letterSpacing:"0.10em", marginBottom:5, fontWeight:600 }}>DATE</div>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)}
            style={{ width:"100%", padding:"9px 12px", boxSizing:"border-box",
              background:T.bg, border:`1px solid ${T.borderMd}`,
              borderRadius:6, color:T.text, fontSize:13, outline:"none", fontFamily:"inherit" }}/>
        </div>
        <div style={{ marginBottom:14 }}>
          <div style={{ fontSize:9, color:T.muted, letterSpacing:"0.10em", marginBottom:5, fontWeight:600 }}>NOTES</div>
          <textarea value={note} onChange={e=>setNote(e.target.value)}
            rows={3} placeholder="аёҡаёұаёҷаё—аё¶аёҒ Group Class вҖ” аёҲаёіаёҷаё§аёҷаё„аёҷ аёӮа№үаёӯаёӘаёұаёҮа№ҖаёҒаё•вҖҰ"
            style={{ width:"100%", padding:"9px 12px", boxSizing:"border-box",
              background:T.bg, border:`1px solid ${T.borderMd}`,
              borderRadius:6, color:T.text, fontSize:12, outline:"none",
              resize:"vertical", fontFamily:"inherit", lineHeight:1.6 }}/>
        </div>
        <div style={{ fontSize:9, color:T.muted, marginBottom:10, padding:"7px 10px",
          borderRadius:6, background:T.greenFaint, border:`1px solid ${T.borderGreen}`, lineHeight:1.6 }}>
          Group session аёҡаёұаёҷаё—аё¶аёҒ program аё—аёөа№Ҳаё—аёі вҖ” <b>а№„аёЎа№Ҳ reset аё„аё°а№Ғаёҷаёҷ Personal</b>
        </div>
        <button onClick={handleSave} disabled={!prog} style={{
          width:"100%", padding:"13px",
          background:prog?`linear-gradient(135deg,${T.green} 0%,#7DC49A 100%)`:"#E5E5E5",
          border:"none", borderRadius:8, color:prog?"#FFF":T.muted,
          fontWeight:700, fontSize:13, cursor:prog?"pointer":"default", letterSpacing:"0.08em",
          boxShadow:prog?"0 2px 10px rgba(100,160,122,0.30)":"none",
        }}>в¬Ў  Save Group Session</button>
      </div>
    </div>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   TAB: COACH (score skills + log session)
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function CoachTab({ scores, onScore, playerName, onNameChange, coachName, onCoachNameChange,
                    onSaveSession, programs, onPrograms, onSaveGroup,
                    customExercises, onCustomExercises, customSkills, headCoachMode,
                    students, coaches, sessions }) {
  const [mode, setMode]       = useState("personal"); // "personal" | "group" | "programs"
  const [section, setSection] = useState("basic");
  const [openB, setOpenB]     = useState("fit");
  const [openLv, setOpenLv]   = useState(1);
  const [note, setNote]       = useState("");
  const [date, setDate]       = useState(today());
  // Previous scores for the selected student (from their last session)
  const prevScores = useMemo(() => getStudentPrevScores(sessions || [], playerName), [sessions, playerName]);

  const scoredCount = ALL_SKILLS.filter(sk => getEffectiveScore(scores[sk.id]) > 0).length;
  const handleSave  = () => {
    onSaveSession({ date, note:note.trim(), coachName });
    setNote(""); setDate(today());
  };

  return (
    <div style={{ display:"flex", flexDirection:"column" }}>

      {/* в”Җв”Җ Mode toggle bar в”Җв”Җ */}
      <div style={{ padding:"12px 16px 0", background:T.surface,
                    borderBottom:`1px solid ${T.border}` }}>
        <div style={{ display:"flex", gap:6, paddingBottom:12 }}>
          {[
            { id:"personal", icon:"в—Ӣ", label:"Personal" },
            { id:"group",    icon:"в¬Ў", label:"Group" },
            { id:"programs", icon:"в–Ј", label:"Programs" },
          ].map(m=>(
            <button key={m.id} onClick={()=>setMode(m.id)} style={{
              flex:1, padding:"8px 4px", borderRadius:7, cursor:"pointer",
              background:mode===m.id?T.goldFaint:T.bg,
              border:`1.5px solid ${mode===m.id?T.borderGold:T.border}`,
              color:mode===m.id?T.gold:T.muted,
              fontSize:9, fontWeight:700, lineHeight:1.5, textAlign:"center",
              fontFamily:"inherit", boxShadow:mode===m.id?"none":T.cardShadow }}>
              <div style={{ fontSize:14, marginBottom:1 }}>{m.icon}</div>
              {m.label}
            </button>
          ))}
        </div>
      </div>

      {/* в•җв•җ PERSONAL MODE в•җв•җ */}
      {mode === "personal" && (
        <div style={{ padding:16, display:"flex", flexDirection:"column", gap:12 }}>

          {/* Student + Coach selector */}
          <div style={{ background:T.surface, borderRadius:10, border:`1px solid ${T.border}`,
                        padding:"14px 16px", boxShadow:T.cardShadow }}>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              <div>
                <div style={{ fontSize:8, color:T.muted, letterSpacing:"0.12em", marginBottom:6, fontWeight:700 }}>
                  в—Ӣ  STUDENT
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                  {(()=>{
                    const sel = (students||[]).find(s=>s.name===playerName);
                    return sel?.avatar ? (
                      <div style={{ width:28, height:28, borderRadius:"50%", flexShrink:0, overflow:"hidden",
                        border:`1.5px solid ${T.borderGold}` }}>
                        <img src={sel.avatar} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }}/>
                      </div>
                    ) : null;
                  })()}
                  <div style={{ flex:1, minWidth:0 }}>
                    {(students||[]).length > 0 ? (
                      <select value={playerName} onChange={e=>onNameChange(e.target.value)}
                        style={{ width:"100%", padding:"9px 10px", boxSizing:"border-box",
                          background:T.bg, border:`1px solid ${T.borderMd}`,
                          borderRadius:6, color:T.text, fontSize:12, outline:"none",
                          fontFamily:"inherit", cursor:"pointer", appearance:"auto" }}>
                        <option value="">вҖ” а№ҖаёҘаё·аёӯаёҒаёҷаёұаёҒа№ҖаёЈаёөаёўаёҷ вҖ”</option>
                        {(students||[]).map(s=>(<option key={s.id} value={s.name}>{s.name}</option>))}
                      </select>
                    ) : (
                      <input value={playerName} onChange={e=>onNameChange(e.target.value)}
                        placeholder="аёҠаё·а№ҲаёӯаёҷаёұаёҒа№ҖаёЈаёөаёўаёҷ"
                        style={{ width:"100%", padding:"9px 10px", boxSizing:"border-box",
                          background:T.bg, border:`1px solid ${T.borderMd}`,
                          borderRadius:6, color:T.text, fontSize:12, outline:"none", fontFamily:"inherit" }}/>
                    )}
                  </div>
                </div>
              </div>
              <div>
                <div style={{ fontSize:8, color:T.muted, letterSpacing:"0.12em", marginBottom:6, fontWeight:700 }}>
                  в—Ҳ  COACH
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                  {(()=>{
                    const sel = (coaches||[]).find(c=>c.name===coachName);
                    return sel?.avatar ? (
                      <div style={{ width:28, height:28, borderRadius:"50%", flexShrink:0, overflow:"hidden",
                        border:`1.5px solid ${T.borderGold}` }}>
                        <img src={sel.avatar} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }}/>
                      </div>
                    ) : null;
                  })()}
                  <div style={{ flex:1, minWidth:0 }}>
                    {(coaches||[]).length > 0 ? (
                      <select value={coachName} onChange={e=>onCoachNameChange(e.target.value)}
                        style={{ width:"100%", padding:"9px 10px", boxSizing:"border-box",
                          background:T.bg, border:`1px solid ${T.borderMd}`,
                          borderRadius:6, color:T.text, fontSize:12, outline:"none",
                          fontFamily:"inherit", cursor:"pointer", appearance:"auto" }}>
                        <option value="">вҖ” а№ҖаёҘаё·аёӯаёҒ Coach вҖ”</option>
                        {(coaches||[]).map(c=>(<option key={c.id} value={c.name}>{c.name}{c.role==="headcoach"?" вӯҗ":""}</option>))}
                      </select>
                    ) : (
                      <input value={coachName} onChange={e=>onCoachNameChange(e.target.value)}
                        placeholder="аёҠаё·а№Ҳаёӯ Coach"
                        style={{ width:"100%", padding:"9px 10px", boxSizing:"border-box",
                          background:T.bg, border:`1px solid ${T.borderMd}`,
                          borderRadius:6, color:T.text, fontSize:12, outline:"none", fontFamily:"inherit" }}/>
                    )}
                  </div>
                </div>
              </div>
            </div>
            {/* Show student's previous session info */}
            {playerName && findLastSession(sessions||[], playerName) && (
              <div style={{ marginTop:8, padding:"6px 10px", borderRadius:6, background:T.goldFaint,
                border:`1px solid ${T.borderGold}`, fontSize:9, color:T.gold, fontWeight:600, lineHeight:1.6 }}>
                в–Ј аёӮа№үаёӯаёЎаё№аёҘаёҘа№ҲаёІаёӘаёёаё”: {findLastSession(sessions, playerName).date}
                {" В· "}Mastery {findLastSession(sessions, playerName).mastery}%
                {" В· "}{findLastSession(sessions, playerName).passedSkills} skills вң“
              </div>
            )}
            {scoredCount > 0 && (
              <div style={{ marginTop:8, padding:"6px 10px", borderRadius:6, background:T.greenFaint,
                border:`1px solid ${T.borderGreen}`, fontSize:9, color:T.green, fontWeight:600 }}>
                вң“ а№ғаё«а№үаё„аё°а№Ғаёҷаёҷа№ҒаёҘа№үаё§ {scoredCount}/{ALL_SKILLS.length} skills вҖ” аёһаёЈа№үаёӯаёЎ Save Session
              </div>
            )}
          </div>

          {/* Category selector вҖ” 3-column grid */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:6, marginBottom:8 }}>
            {CATEGORIES.map(cat=>(
              <button key={cat.id} onClick={()=>{
                if (cat.id==="basic") { setSection("basic"); }
                else { const first=cat.tracks[0]; if(first) setSection(first); }
                setOpenLv(1);
              }} style={{
                padding:"10px 6px", borderRadius:8, cursor:"pointer", textAlign:"center",
                background:(cat.id==="basic"?section==="basic"||section==="st"||section==="fx":cat.tracks.includes(section))?cat.faint:T.surface,
                border:`1.5px solid ${(cat.id==="basic"?section==="basic"||section==="st"||section==="fx":cat.tracks.includes(section))?cat.border:T.border}`,
                color:(cat.id==="basic"?section==="basic"||section==="st"||section==="fx":cat.tracks.includes(section))?cat.color:T.muted,
                fontSize:9, fontWeight:700, letterSpacing:"0.04em",
                boxShadow:"none", fontFamily:"inherit", lineHeight:1.4,
              }}>
                <div style={{ fontSize:16, marginBottom:3 }}>{cat.icon}</div>
                {cat.label}
              </button>
            ))}
          </div>

          {/* Sub-track selector for non-basic categories */}
          {(()=>{
            const activeCat = CATEGORIES.find(c=> c.id==="basic" ? (section==="basic"||section==="st"||section==="fx") : c.tracks.includes(section));
            if (!activeCat || activeCat.id==="basic") return null;
            const catTracks = activeCat.tracks.map(k=>TRACK_CONFIG.find(t=>t.key===k)).filter(Boolean);
            if (catTracks.length <= 1) return null;
            return (
              <div style={{ display:"grid", gridTemplateColumns:`repeat(${Math.min(catTracks.length,3)},1fr)`, gap:5, marginBottom:8 }}>
                {catTracks.map(tk=>(
                  <button key={tk.key} onClick={()=>{setSection(tk.key);setOpenLv(1);}} style={{
                    padding:"8px 6px", borderRadius:7, cursor:"pointer", textAlign:"center",
                    background:section===tk.key?tk.faint:T.surface,
                    border:`1.5px solid ${section===tk.key?tk.border:T.border}`,
                    color:section===tk.key?tk.color:T.muted,
                    fontSize:8, fontWeight:700, letterSpacing:"0.04em",
                    boxShadow:section===tk.key?"none":T.cardShadow,
                    fontFamily:"inherit", lineHeight:1.3,
                  }}>
                    <div style={{ fontSize:14, marginBottom:2 }}>{tk.icon}</div>
                    {tk.label}
                  </button>
                ))}
              </div>
            );
          })()}

          {section==="basic"&&(
            <>
              <div style={{ padding:"9px 14px", borderRadius:8, background:T.blueFaint,
                            border:`1px solid ${T.borderBlue}`, fontSize:11, color:T.sub }}>
                а№ғаё«а№үаё„аё°а№Ғаёҷаёҷ вүҘ <b style={{ color:T.blue }}>6/10</b> аё—аёёаёҒ skill а№Җаёһаё·а№Ҳаёӯаёңа№ҲаёІаёҷа№Ғаё•а№ҲаёҘаё°аёҒаёҘаёёа№ҲаёЎ
              </div>
              {BASIC_GROUPS.map(g=>(
                <BasicGroupCard key={g.id} group={g} scores={scores} coachMode onScore={onScore}
                  isOpen={openB===g.id} onToggle={()=>setOpenB(openB===g.id?null:g.id)}
                  editMode={false} customGroupSkills={(customSkills||{})[g.id]||[]}
                  headCoachMode={headCoachMode} prevScores={prevScores}/>
              ))}
              {/* Strength levels in Basic */}
              {(()=>{
                const stTrack = TRACK_CONFIG.find(t=>t.key==="st");
                if (!stTrack) return null;
                const tUnlocked = calcUnlockedTrack(stTrack.levels, scores);
                const tCleared  = calcClearedTrack(stTrack.levels, scores);
                return (
                  <>
                    <div style={{ padding:"9px 14px", borderRadius:8, background:stTrack.faint,
                      border:`1px solid ${stTrack.border}`, fontSize:11, color:T.sub, marginTop:8 }}>
                      а№ғаё«а№үаё„аё°а№Ғаёҷаёҷ <b style={{ color:stTrack.color }}>в—Ҷ STRENGTH</b> вүҘ 6/10 аё—аёёаёҒ skill
                    </div>
                    {stTrack.levels.map(lv=>(
                      <HSLevelCard key={`st_${lv.id}`} level={lv} scores={scores}
                        unlockedLevels={tUnlocked} clearedLevels={tCleared}
                        coachMode onScore={onScore}
                        isOpen={openLv===lv.id && section==="st"} onToggle={()=>{setSection("st");setOpenLv(openLv===lv.id?null:lv.id);}}
                        editMode={false} customLevelSkills={(customSkills||{})[`st_${lv.id}`]||[]}
                        headCoachMode={headCoachMode}
                        accentColor={stTrack.color} accentFaint={stTrack.faint}
                        accentGlow={stTrack.glow} accentBorder={stTrack.border}
                        prevScores={prevScores}/>
                    ))}
                  </>
                );
              })()}
              {/* Stretch levels in Basic */}
              {(()=>{
                const fxTrack = TRACK_CONFIG.find(t=>t.key==="fx");
                if (!fxTrack) return null;
                const tUnlocked = calcUnlockedTrack(fxTrack.levels, scores);
                const tCleared  = calcClearedTrack(fxTrack.levels, scores);
                return (
                  <>
                    <div style={{ padding:"9px 14px", borderRadius:8, background:fxTrack.faint,
                      border:`1px solid ${fxTrack.border}`, fontSize:11, color:T.sub, marginTop:8 }}>
                      а№ғаё«а№үаё„аё°а№Ғаёҷаёҷ <b style={{ color:fxTrack.color }}>вүӢ STRETCH</b> вүҘ 6/10 аё—аёёаёҒ skill
                    </div>
                    {fxTrack.levels.map(lv=>(
                      <HSLevelCard key={`fx_${lv.id}`} level={lv} scores={scores}
                        unlockedLevels={tUnlocked} clearedLevels={tCleared}
                        coachMode onScore={onScore}
                        isOpen={openLv===lv.id && section==="fx"} onToggle={()=>{setSection("fx");setOpenLv(openLv===lv.id?null:lv.id);}}
                        editMode={false} customLevelSkills={(customSkills||{})[`fx_${lv.id}`]||[]}
                        headCoachMode={headCoachMode}
                        accentColor={fxTrack.color} accentFaint={fxTrack.faint}
                        accentGlow={fxTrack.glow} accentBorder={fxTrack.border}
                        prevScores={prevScores}/>
                    ))}
                  </>
                );
              })()}
            </>
          )}

          {/* Generic coach view for discipline tracks (non-basic) */}
          {section!=="basic"&&section!=="st"&&section!=="fx"&&(()=>{
            const activeTrack = TRACK_CONFIG.find(t=>t.key===section);
            if (!activeTrack) return null;
            const tUnlocked = calcUnlockedTrack(activeTrack.levels, scores);
            const tCleared  = calcClearedTrack(activeTrack.levels, scores);
            return (
              <>
                <div style={{ padding:"9px 14px", borderRadius:8, background:activeTrack.faint,
                              border:`1px solid ${activeTrack.border}`, fontSize:11, color:T.sub }}>
                  а№ғаё«а№үаё„аё°а№Ғаёҷаёҷ вүҘ <b style={{ color:activeTrack.color }}>6/10</b> аё—аёёаёҒ skill а№Җаёһаё·а№ҲаёӯаёӣаёҘаё”аёҘа№Үаёӯаё„ Level аё–аёұаё”а№„аёӣ
                </div>
                {activeTrack.levels.map(lv=>(
                  <HSLevelCard key={`${activeTrack.key}_${lv.id}`} level={lv} scores={scores}
                    unlockedLevels={tUnlocked} clearedLevels={tCleared}
                    coachMode onScore={onScore}
                    isOpen={openLv===lv.id} onToggle={()=>setOpenLv(openLv===lv.id?null:lv.id)}
                    editMode={false} customLevelSkills={(customSkills||{})[`${activeTrack.key}_${lv.id}`]||[]}
                    headCoachMode={headCoachMode}
                    accentColor={activeTrack.color} accentFaint={activeTrack.faint}
                    accentGlow={activeTrack.glow} accentBorder={activeTrack.border}
                    prevScores={prevScores}/>
                ))}
              </>
            );
          })()}

          {/* Log session */}
          <div style={{ background:T.surface, borderRadius:10, border:`1px solid ${T.border}`,
                        padding:"16px", boxShadow:T.cardShadow }}>
            <div style={{ fontSize:9, color:T.muted, letterSpacing:"0.14em", marginBottom:12, fontWeight:600 }}>
              LOG SESSION
            </div>
            <div style={{ marginBottom:10 }}>
              <div style={{ fontSize:9, color:T.muted, letterSpacing:"0.10em", marginBottom:5, fontWeight:600 }}>DATE</div>
              <input type="date" value={date} onChange={e=>setDate(e.target.value)}
                style={{ width:"100%", padding:"9px 12px", boxSizing:"border-box",
                  background:T.bg, border:`1px solid ${T.borderMd}`,
                  borderRadius:6, color:T.text, fontSize:13, outline:"none", fontFamily:"inherit" }}/>
            </div>
            <div style={{ marginBottom:14 }}>
              <div style={{ fontSize:9, color:T.muted, letterSpacing:"0.10em", marginBottom:5, fontWeight:600 }}>
                SESSION NOTES
              </div>
              <textarea value={note} onChange={e=>setNote(e.target.value)}
                rows={3} placeholder="аёҡаёұаёҷаё—аё¶аёҒаёңаёҘаёҒаёІаёЈа№ҖаёЈаёөаёўаёҷ аёӘаёҙа№ҲаёҮаё—аёөа№Ҳаё—аёіа№„аё”а№үаё”аёө аёӣаёұаёҚаё«аёІ аёӮа№үаёӯаёӘаёұаёҮа№ҖаёҒаё•вҖҰ"
                style={{ width:"100%", padding:"9px 12px", boxSizing:"border-box",
                  background:T.bg, border:`1px solid ${T.borderMd}`,
                  borderRadius:6, color:T.text, fontSize:12, outline:"none",
                  resize:"vertical", fontFamily:"inherit", lineHeight:1.6 }}/>
            </div>
            <div style={{ fontSize:9, color:T.muted, marginBottom:10, padding:"7px 10px",
              borderRadius:6, background:T.faint, border:`1px solid ${T.border}`, lineHeight:1.6 }}>
              аё«аёҘаёұаёҮаёҒаё” Save вҖ” аё„аё°а№Ғаёҷаёҷаё—аёұа№үаёҮаё«аёЎаё”аёҲаё° reset аёһаёЈа№үаёӯаёЎаёӘаёіаё«аёЈаёұаёҡаёҷаёұаёҒа№ҖаёЈаёөаёўаёҷаё„аёҷаё–аёұаё”а№„аёӣ
            </div>
            <button onClick={handleSave} style={{
              width:"100%", padding:"13px",
              background:`linear-gradient(135deg,${T.gold} 0%,${T.goldBright} 100%)`,
              border:"none", borderRadius:8, color:"#FFFFFF",
              fontWeight:700, fontSize:13, cursor:"pointer", letterSpacing:"0.08em",
              boxShadow:"0 2px 10px rgba(184,126,106,0.35)",
            }}>вңҰ  Save Session &amp; Reset</button>
          </div>
        </div>
      )}

      {/* в•җв•җ GROUP MODE в•җв•җ */}
      {mode === "group" && (
        <GroupLogger programs={programs} coachName={coachName}
          onCoachNameChange={onCoachNameChange} onSaveGroup={onSaveGroup}/>
      )}

      {/* в•җв•җ PROGRAMS MODE в•җв•җ */}
      {mode === "programs" && (
        <ProgramManager programs={programs} onPrograms={onPrograms}
          customExercises={customExercises||{}} onCustomExercises={onCustomExercises}/>
      )}
    </div>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   TAB: HISTORY (chart + session list)
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function HistoryTab({ sessions }) {
  // Only personal sessions have mastery data for the chart
  const personalSessions = sessions.filter(s => s.type !== "group");
  const chartData = personalSessions.map(s => ({
    label: `#${s.id}`, mastery: s.mastery, passed: s.passedSkills,
  }));

  if (sessions.length === 0) return (
    <div style={{ padding:32, textAlign:"center" }}>
      <div style={{ fontSize:40, marginBottom:14 }}>в–Ј</div>
      <div style={{ fontSize:14, fontWeight:700, color:T.sub, marginBottom:8 }}>аёўаёұаёҮа№„аёЎа№ҲаёЎаёө Session</div>
      <div style={{ fontSize:12, color:T.muted, lineHeight:1.7 }}>
        а№„аёӣаё—аёөа№Ҳа№Ғаё—а№Үаёҡ <b style={{ color:T.gold }}>COACH</b> а№Җаёһаё·а№Ҳаёӯа№ғаё«а№үаё„аё°а№Ғаёҷаёҷ skills<br/>
        а№ҒаёҘа№үаё§аёҒаё” <b style={{ color:T.gold }}>Save Session</b> а№Җаёһаё·а№Ҳаёӯаёҡаёұаёҷаё—аё¶аёҒ<br/>
        аё«аёЈаё·аёӯаёҒаё” <b style={{ color:T.green }}>Save Group Session</b> аёӘаёіаё«аёЈаёұаёҡ Group Class
      </div>
    </div>
  );

  return (
    <div style={{ padding:16, display:"flex", flexDirection:"column", gap:12 }}>

      {/* Mastery chart */}
      <div style={{ background:T.surface, borderRadius:10, border:`1px solid ${T.border}`,
                    padding:"16px 18px", boxShadow:T.cardShadow }}>
        <div style={{ fontSize:9, color:T.muted, letterSpacing:"0.14em", marginBottom:14, fontWeight:600 }}>
          MASTERY PROGRESS вҖ” {personalSessions.length} PERSONAL SESSIONS
        </div>
        <ResponsiveContainer width="100%" height={180}>
          <AreaChart data={chartData} margin={{ top:8, right:8, left:-20, bottom:0 }}>
            <defs>
              <linearGradient id="histGoldGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="5%"  stopColor={T.gold} stopOpacity={0.22}/>
                <stop offset="95%" stopColor={T.gold} stopOpacity={0}/>
              </linearGradient>
            </defs>
            <CartesianGrid strokeDasharray="3 3" stroke="rgba(0,0,0,0.05)"/>
            <XAxis dataKey="label" tick={{ fontSize:9, fill:T.muted }} axisLine={false} tickLine={false}/>
            <YAxis domain={[0,100]} tick={{ fontSize:9, fill:T.muted }} axisLine={false} tickLine={false}/>
            <Tooltip content={<LightTip/>}/>
            <ReferenceLine y={60} stroke={`${T.gold}55`} strokeDasharray="4 3"
              label={{ value:"60%", fontSize:8, fill:T.muted, position:"insideTopRight" }}/>
            <Area type="monotone" dataKey="mastery" name="Mastery" stroke={T.gold} strokeWidth={2}
              fill="url(#histGoldGrad)" dot={{ r:3, fill:T.gold, stroke:T.surface, strokeWidth:2 }}/>
          </AreaChart>
        </ResponsiveContainer>
      </div>

      {/* Skills passed chart */}
      {personalSessions.length > 2 && (
        <div style={{ background:T.surface, borderRadius:10, border:`1px solid ${T.border}`,
                      padding:"16px 18px", boxShadow:T.cardShadow }}>
          <div style={{ fontSize:9, color:T.muted, letterSpacing:"0.14em", marginBottom:14, fontWeight:600 }}>
            SKILLS PASSED OVER TIME
          </div>
          <ResponsiveContainer width="100%" height={130}>
            <AreaChart data={chartData} margin={{ top:4, right:8, left:-20, bottom:0 }}>
              <defs>
                <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="5%"  stopColor={T.blue} stopOpacity={0.18}/>
                  <stop offset="95%" stopColor={T.blue} stopOpacity={0}/>
                </linearGradient>
              </defs>
              <CartesianGrid strokeDasharray="3 3" stroke="rgba(0,0,0,0.05)"/>
              <XAxis dataKey="label" tick={{ fontSize:9, fill:T.muted }} axisLine={false} tickLine={false}/>
              <YAxis domain={[0,ALL_SKILLS.length]} tick={{ fontSize:9, fill:T.muted }} axisLine={false} tickLine={false}/>
              <Tooltip content={<LightTip/>}/>
              <Area type="monotone" dataKey="passed" name="Skills Passed" stroke={T.blue} strokeWidth={2}
                fill="url(#blueGrad)" dot={{ r:3, fill:T.blue, stroke:T.surface, strokeWidth:2 }}/>
            </AreaChart>
          </ResponsiveContainer>
        </div>
      )}

      {/* Session list */}
      <SessionList sessions={sessions}/>
    </div>
  );
}

function SessionList({ sessions }) {
  const [expandedId, setExpandedId] = useState(null);
  return (
    <div style={{ background:T.surface, borderRadius:10, border:`1px solid ${T.border}`,
                  overflow:"hidden", boxShadow:T.cardShadow }}>
      <div style={{ padding:"14px 16px 10px", fontSize:9, color:T.muted,
                    letterSpacing:"0.14em", fontWeight:600 }}>
        ALL SESSIONS
      </div>
      {[...sessions].reverse().map(s => {
        const isGroup = s.type === "group";
        const isOpen  = expandedId === s.id;
        const snap    = s.scoreSnapshot || {};
        const basicScored = BASIC_GROUPS.map(g => ({
          ...g, skills: g.skills.filter(sk => getEffectiveScore(snap[sk.id]) > 0),
        })).filter(g => g.skills.length > 0);
        const hsScored = HS_LEVELS.map(lv => ({
          ...lv, skills: lv.skills.filter(sk => getEffectiveScore(snap[sk.id]) > 0),
        })).filter(lv => lv.skills.length > 0);
        const hasScores = basicScored.length > 0 || hsScored.length > 0;

        return (
          <div key={s.id} style={{ borderTop:`1px solid ${T.divider}` }}>
            {/* Row header */}
            <div onClick={()=>setExpandedId(isOpen ? null : s.id)}
              style={{ display:"flex", gap:12, padding:"11px 16px",
                       cursor:"pointer", background:isOpen?T.surfaceHi:T.surface,
                       alignItems:"flex-start", userSelect:"none" }}>
              <div style={{ minWidth:34, height:34, borderRadius:"50%", flexShrink:0,
                background:isGroup?T.greenFaint:T.goldFaint,
                border:`1px solid ${isGroup?T.borderGreen:T.borderGold}`,
                display:"flex", alignItems:"center", justifyContent:"center",
                fontWeight:800, fontSize:isGroup?14:11, color:isGroup?T.green:T.gold }}>
                {isGroup ? "в¬Ў" : s.id}
              </div>
              <div style={{ flex:1 }}>
                <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:4, flexWrap:"wrap" }}>
                  <span style={{ fontWeight:700, fontSize:12, color:T.text }}>{s.date}</span>
                  {isGroup ? (
                    <>
                      <span style={{ background:T.greenFaint, border:`1px solid ${T.borderGreen}`,
                        borderRadius:99, padding:"1px 8px", fontSize:10, fontWeight:700, color:T.green }}>
                        GROUP
                      </span>
                      <span style={{ fontSize:10, fontWeight:600, color:T.sub }}>
                        {s.programName}
                      </span>
                    </>
                  ) : (
                    <>
                      <span style={{ background:T.goldFaint, border:`1px solid ${T.borderGold}`,
                        borderRadius:99, padding:"1px 8px", fontSize:10, fontWeight:700, color:T.gold }}>
                        {s.mastery}%
                      </span>
                      <span style={{ background:T.blueFaint, border:`1px solid ${T.borderBlue}`,
                        borderRadius:99, padding:"1px 8px", fontSize:10, fontWeight:700, color:T.blue }}>
                        {s.passedSkills} skills вң“
                      </span>
                    </>
                  )}
                </div>
                {s.coachName && (
                  <div style={{ fontSize:9, color:T.muted, marginBottom:3 }}>
                    в—Ҳ Coach: <b style={{ color:T.sub }}>{s.coachName}</b>
                  </div>
                )}
                {s.note && (
                  <div style={{ fontSize:11, color:T.sub, lineHeight:1.5 }}>"{s.note}"</div>
                )}
              </div>
              <div style={{ fontSize:10, color:T.muted, paddingTop:2, flexShrink:0 }}>
                {isOpen ? "в–І" : "в–ј"}
              </div>
            </div>

            {/* Expandable detail */}
            {isOpen && (
              <div style={{ padding:"12px 16px 16px", background:T.faint,
                            borderTop:`1px solid ${T.divider}` }}>

                {/* в”Җв”Җ GROUP session: show program exercises в”Җв”Җ */}
                {isGroup && (
                  <div>
                    <div style={{ fontSize:8, color:T.green, fontWeight:800, letterSpacing:"0.10em",
                      marginBottom:8 }}>в–Ј  {(s.programName||"").toUpperCase()} вҖ” EXERCISES</div>
                    {(s.programSnapshot||[]).length === 0 && (
                      <div style={{ fontSize:10, color:T.muted, textAlign:"center", padding:"8px 0" }}>
                        а№„аёЎа№ҲаёЎаёөаёӮа№үаёӯаёЎаё№аёҘ exercises
                      </div>
                    )}
                    {(s.programSnapshot||[]).map((ex, i) => (
                      <div key={ex.id||i} style={{ display:"flex", alignItems:"center", gap:8,
