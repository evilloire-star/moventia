                        padding:"7px 10px", background:T.surface, borderRadius:6,
                        border:`1px solid ${T.border}`, marginBottom:5 }}>
                        <span style={{ fontSize:9, color:T.muted, fontWeight:700, minWidth:16 }}>{i+1}</span>
                        <span style={{ flex:1, fontSize:11, color:T.text, fontWeight:600 }}>{ex.name||"вҖ”"}</span>
                        <span style={{ fontSize:9, color:T.sub, fontWeight:600 }}>
                          {ex.sets}Г—{ex.value}{ex.useReps?"аё„аёЈаёұа№үаёҮ":"аё§аёҙ"}
                        </span>
                      </div>
                    ))}
                  </div>
                )}

                {/* в”Җв”Җ PERSONAL session: score breakdown в”Җв”Җ */}
                {!isGroup && (
                  <>
                    {!hasScores && (
                      <div style={{ fontSize:10, color:T.muted, textAlign:"center", padding:"12px 0" }}>
                        а№„аёЎа№ҲаёЎаёөаёӮа№үаёӯаёЎаё№аёҘаё„аё°а№Ғаёҷаёҷ
                      </div>
                    )}
                    {basicScored.map(g => (
                      <div key={g.id} style={{ marginBottom:12 }}>
                        <div style={{ fontSize:8, color:g.color, fontWeight:800, letterSpacing:"0.10em",
                          marginBottom:6, display:"flex", alignItems:"center", gap:5 }}>
                          {g.icon} {g.name}
                        </div>
                        {g.skills.map(sk => {
                          const eff  = getEffectiveScore(snap[sk.id]);
                          const data = typeof snap[sk.id]==="object" ? snap[sk.id] : null;
                          const passed = eff >= g.passScore;
                          return (
                            <div key={sk.id} style={{ marginBottom:5 }}>
                              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:2 }}>
                                <span style={{ fontSize:10, color:T.sub }}>{sk.name}</span>
                                <div style={{ display:"flex", gap:5, alignItems:"center" }}>
                                  {data?.sets > 0 && (
                                    <span style={{ fontSize:8, color:T.muted }}>
                                      {data.sets}Г—{data.useReps?`${data.reps||0}аё„аёЈаёұа№үаёҮ`:`${data.duration||0}аё§аёҙ`}
                                      {!data.bodyWeight && data.weight>0 ? ` +${data.weight}kg`:""}
                                    </span>
                                  )}
                                  {data?.photos?.length > 0 && (
                                    <span style={{ fontSize:9, color:T.muted }}>в–«{data.photos.length}</span>
                                  )}
                                  <span style={{ fontSize:11, fontWeight:800,
                                    color:passed?g.color:eff>0?T.sub:T.lockedTxt }}>
                                    {eff}/10{passed?" вң“":""}
                                  </span>
                                </div>
                              </div>
                              <div style={{ height:3, background:T.locked, borderRadius:2, overflow:"hidden" }}>
                                <div style={{ width:`${eff*10}%`, height:"100%", borderRadius:2,
                                  background:passed?g.color:T.silver, transition:"width 0.4s" }}/>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    ))}
                    {hsScored.map(lv => (
                      <div key={lv.id} style={{ marginBottom:12 }}>
                        <div style={{ fontSize:8, color:T.gold, fontWeight:800, letterSpacing:"0.10em",
                          marginBottom:6, display:"flex", alignItems:"center", gap:5 }}>
                          {lv.icon} LEVEL {lv.id} В· {lv.name}
                        </div>
                        {lv.skills.map(sk => {
                          const eff  = getEffectiveScore(snap[sk.id]);
                          const data = typeof snap[sk.id]==="object" ? snap[sk.id] : null;
                          const passed = eff >= lv.passScore;
                          return (
                            <div key={sk.id} style={{ marginBottom:5 }}>
                              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:2 }}>
                                <span style={{ fontSize:10, color:T.sub }}>{sk.name}</span>
                                <div style={{ display:"flex", gap:5, alignItems:"center" }}>
                                  {data?.sets > 0 && (
                                    <span style={{ fontSize:8, color:T.muted }}>
                                      {data.sets}Г—{data.useReps?`${data.reps||0}аё„аёЈаёұа№үаёҮ`:`${data.duration||0}аё§аёҙ`}
                                      {!data.bodyWeight && data.weight>0 ? ` +${data.weight}kg`:""}
                                    </span>
                                  )}
                                  {data?.photos?.length > 0 && (
                                    <span style={{ fontSize:9, color:T.muted }}>в–«{data.photos.length}</span>
                                  )}
                                  <span style={{ fontSize:11, fontWeight:800,
                                    color:passed?T.gold:eff>0?T.sub:T.lockedTxt }}>
                                    {eff}/10{passed?" вң“":""}
                                  </span>
                                </div>
                              </div>
                              <div style={{ height:3, background:T.locked, borderRadius:2, overflow:"hidden" }}>
                                <div style={{ width:`${eff*10}%`, height:"100%", borderRadius:2,
                                  background:passed?T.gold:T.silver, transition:"width 0.4s" }}/>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    ))}
                  </>
                )}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   TAB: SETTINGS / REGIS
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function SettingsTab({ headCoachMode, onHeadCoachMode, coaches, onCoaches, students, onStudents }) {
  const [section, setSection]       = useState("coaches");
  const [coachForm, setCoachForm]   = useState(null);
  const [studentForm, setStudentForm] = useState(null);

  const blankCoach   = () => ({ id:`co_${Date.now().toString(36)}`, name:"", position:"", role:"coach", email:"", birthday:"", tel:"", ig:"", avatar:"" });
  const blankStudent = () => ({ id:`st_${Date.now().toString(36)}`, name:"", email:"", birthday:"", tel:"", ig:"", avatar:"" });

  const saveCoach = c => {
    if (!c.name.trim()) return;
    onCoaches(coaches.find(x=>x.id===c.id) ? coaches.map(x=>x.id===c.id?c:x) : [...coaches, c]);
    setCoachForm(null);
  };
  const saveStudent = s => {
    if (!s.name.trim()) return;
    onStudents(students.find(x=>x.id===s.id) ? students.map(x=>x.id===s.id?s:x) : [...students, s]);
    setStudentForm(null);
  };

  const inp = { width:"100%", padding:"9px 11px", borderRadius:8,
    border:`1.5px solid ${T.border}`, background:T.bg2, color:T.text,
    fontSize:11, outline:"none", boxSizing:"border-box" };

  const renderForm = (data, onChange, onSave, onCancel, isCoach) => (
    <div style={{ background:T.surfaceHi, borderRadius:10, padding:"14px 16px",
      border:`1px solid ${T.borderMd}`, marginBottom:10 }}>
      <div style={{ fontSize:10, fontWeight:700, color:T.sub, letterSpacing:"0.08em", marginBottom:10 }}>
        {isCoach?"в—Ҷ":"в—Ӣ"} {coaches.concat(students).some(x=>x.id===data.id)?"вңҺ EDIT":"вһ• ADD"}{isCoach?" COACH":" STUDENT"}
      </div>
      {/* Avatar upload */}
      <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:12 }}>
        <div style={{ width:56, height:56, borderRadius:"50%", flexShrink:0, overflow:"hidden",
          background:T.faint, border:`2px solid ${data.avatar?T.borderGold:T.borderMd}`,
          display:"flex", alignItems:"center", justifyContent:"center" }}>
          {data.avatar
            ? <img src={data.avatar} alt="avatar" style={{ width:"100%", height:"100%", objectFit:"cover" }}/>
            : <span style={{ fontSize:22 }}>{isCoach?"в—Ҷ":"в—Ӣ"}</span>}
        </div>
        <div>
          <label style={{ display:"inline-block", padding:"6px 14px", borderRadius:7, cursor:"pointer",
            background:T.goldFaint, border:`1px solid ${T.borderGold}`, color:T.gold,
            fontSize:10, fontWeight:700, letterSpacing:"0.06em" }}>
            в–« а№ҖаёҘаё·аёӯаёҒаёЈаё№аёӣ
            <input type="file" accept="image/*" style={{ display:"none" }}
              onChange={e=>{
                const file = e.target.files?.[0];
                if(!file) return;
                const reader = new FileReader();
                reader.onload = ev => onChange({...data, avatar:ev.target.result});
                reader.readAsDataURL(file);
                e.target.value="";
              }}/>
          </label>
          {data.avatar && (
            <button onClick={()=>onChange({...data, avatar:""})}
              style={{ marginLeft:8, padding:"5px 10px", borderRadius:6, border:`1px solid ${T.border}`,
                background:"transparent", color:T.muted, fontSize:9, cursor:"pointer", fontWeight:600 }}>аёҘаёҡаёЈаё№аёӣ</button>
          )}
          <div style={{ fontSize:8, color:T.muted, marginTop:4 }}>аёЈаё№аёӣа№ӮаёӣаёЈа№„аёҹаёҘа№Ң (а№„аёЎа№ҲаёҡаёұаёҮаё„аёұаёҡ)</div>
        </div>
      </div>
      <input placeholder="Name *" value={data.name||""} onChange={e=>onChange({...data,name:e.target.value})} style={{...inp,marginBottom:8}}/>
      {isCoach&&<input placeholder="Position (а№ҖаёҠа№Ҳаёҷ Head Coach, Coach, Intern)" value={data.position||""} onChange={e=>onChange({...data,position:e.target.value})} style={{...inp,marginBottom:8}}/>}
      {isCoach&&(
        <div style={{ marginBottom:8 }}>
          <div style={{ fontSize:10, color:T.muted, marginBottom:4 }}>Role / аёӘаёҙаё—аёҳаёҙа№ҢаёҒаёІаёЈа№ғаёҠа№үаёҮаёІаёҷ</div>
          <select value={data.role||"coach"} onChange={e=>onChange({...data,role:e.target.value})}
            style={{...inp, marginBottom:0, appearance:"none", WebkitAppearance:"none", cursor:"pointer"}}>
            <option value="coach">Coach</option>
            <option value="headcoach">Head Coach</option>
          </select>
        </div>
      )}
      <input placeholder="Email" value={data.email||""} onChange={e=>onChange({...data,email:e.target.value})} style={{...inp,marginBottom:8}}/>
      <input placeholder="Birthday (а№ҖаёҠа№Ҳаёҷ 1990-05-22)" value={data.birthday||""} onChange={e=>onChange({...data,birthday:e.target.value})} style={{...inp,marginBottom:8}}/>
      <input placeholder="Tel" value={data.tel||""} onChange={e=>onChange({...data,tel:e.target.value})} style={{...inp,marginBottom:8}}/>
      <input placeholder="Instagram (@username)" value={data.ig||""} onChange={e=>onChange({...data,ig:e.target.value})} style={{...inp,marginBottom:14}}/>
      <div style={{ display:"flex", gap:8 }}>
        <button onClick={()=>onSave(data)}
          style={{ flex:1, padding:"9px 0", borderRadius:8, border:"none",
            background:"#22a55e", color:"#fff", fontSize:11, fontWeight:700,
            cursor:"pointer", letterSpacing:"0.08em" }}>SAVE</button>
        <button onClick={onCancel}
          style={{ flex:1, padding:"9px 0", borderRadius:8,
            border:`1px solid ${T.border}`, background:"transparent", color:T.muted,
            fontSize:11, fontWeight:700, cursor:"pointer", letterSpacing:"0.08em" }}>CANCEL</button>
      </div>
    </div>
  );

  const renderCard = (person, onEdit, onDelete, isCoach) => (
    <div key={person.id} style={{ background:T.surface, border:`1px solid ${T.border}`,
      borderRadius:10, padding:"12px 14px", marginBottom:8 }}>
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:6 }}>
        <div style={{ width:36, height:36, borderRadius:"50%", background:T.faint,
          border:`1.5px solid ${person.avatar?T.borderGold:T.borderMd}`, display:"flex", alignItems:"center",
          justifyContent:"center", fontSize:16, flexShrink:0, overflow:"hidden" }}>
          {person.avatar
            ? <img src={person.avatar} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }}/>
            : (isCoach?"в—Ҷ":"в—Ӣ")}
        </div>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:13, fontWeight:700, color:T.text }}>{person.name}</div>
          {isCoach&&<div style={{ fontSize:10, fontWeight:600,
            color:person.role==="headcoach"?T.gold:T.sub }}>
            {person.position||""}{person.position&&" В· "}{person.role==="headcoach"?"Head Coach вӯҗ":"Coach"}
          </div>}
        </div>
        <div style={{ display:"flex", gap:7 }}>
          <button onClick={()=>onEdit({...person})}
            style={{ padding:"5px 10px", borderRadius:7, border:`1px solid ${T.border}`,
              background:T.surfaceHi, color:T.sub, fontSize:10, cursor:"pointer", fontWeight:600 }}>вңҺ</button>
          {headCoachMode&&(
            <button onClick={()=>onDelete(person.id)}
              style={{ padding:"5px 10px", borderRadius:7, border:"none",
                background:"rgba(220,50,50,0.12)", color:"#e05555",
                fontSize:10, cursor:"pointer", fontWeight:600 }}>вң•</button>
          )}
        </div>
      </div>
      <div style={{ display:"flex", flexWrap:"wrap", gap:"4px 12px", fontSize:10, color:T.muted }}>
        {person.email&&<span>вңү {person.email}</span>}
        {person.tel&&<span>в–ё {person.tel}</span>}
        {person.ig&&<span>в—Ү @{(person.ig||"").replace(/^@/,"")}</span>}
        {person.birthday&&<span>в–Ә {person.birthday}</span>}
      </div>
    </div>
  );

  return (
    <div style={{ padding:16 }}>

      {/* HEAD COACH MODE TOGGLE */}
      <div style={{ background:T.surface,
        border:`1px solid ${headCoachMode?T.borderGold:T.border}`,
        borderRadius:10, padding:"14px 16px", marginBottom:16,
        boxShadow:headCoachMode?`0 2px 12px ${T.goldFaint}`:T.cardShadow }}>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:12, fontWeight:700, letterSpacing:"0.05em",
              color:headCoachMode?T.gold:T.text }}>вӯҗ Head Coach Mode</div>
            <div style={{ fontSize:10, color:T.muted, marginTop:3 }}>
              а№Җаёӣаёҙаё”а№Җаёһаё·а№ҲаёӯаёҘаёҡ / аёҲаёұаё”аёҒаёІаёЈ Skills, Coaches, Students
            </div>
          </div>
          <div onClick={()=>onHeadCoachMode(!headCoachMode)}
            style={{ width:44, height:24, borderRadius:12, cursor:"pointer",
              transition:"all 0.2s", position:"relative",
              background:headCoachMode?"#d4a017":"rgba(0,0,0,0.15)",
              border:`2px solid ${headCoachMode?T.gold:T.border}` }}>
            <div style={{ position:"absolute", top:2, left:headCoachMode?20:2,
              width:16, height:16, borderRadius:"50%", transition:"left 0.2s",
              background:headCoachMode?"#fff":"rgba(255,255,255,0.5)" }}/>
          </div>
        </div>
      </div>

      {/* SECTION TABS */}
      <div style={{ display:"flex", gap:8, marginBottom:14 }}>
        {[
          { id:"coaches",  label:"в—Ҷ  COACHES",  count:coaches.length },
          { id:"students", label:"в—Ӣ  STUDENTS", count:students.length },
        ].map(s=>(
          <button key={s.id} onClick={()=>setSection(s.id)} style={{
            flex:1, padding:"10px 0", borderRadius:8, cursor:"pointer",
            background:section===s.id?T.goldFaint:T.surface,
            border:`1.5px solid ${section===s.id?T.borderGold:T.border}`,
            color:section===s.id?T.gold:T.muted,
            fontSize:10, fontWeight:700, letterSpacing:"0.08em",
          }}>{s.label} ({s.count})</button>
        ))}
      </div>

      {/* COACHES */}
      {section==="coaches"&&(
        <div>
          {coachForm&&renderForm(coachForm, setCoachForm, saveCoach, ()=>setCoachForm(null), true)}
          {!coachForm&&(
            <button onClick={()=>setCoachForm(blankCoach())}
              style={{ width:"100%", padding:"10px 0", borderRadius:8, cursor:"pointer", marginBottom:12,
                border:`1.5px dashed ${T.gold}`, background:T.goldFaint, color:T.gold,
                fontSize:11, fontWeight:700, letterSpacing:"0.08em" }}>+ Add Coach</button>
          )}
          {coaches.length===0&&!coachForm&&(
            <div style={{ textAlign:"center", padding:"24px 0", color:T.muted, fontSize:11 }}>
              аёўаёұаёҮа№„аёЎа№ҲаёЎаёө Coach вҖ” аёҒаё” Add Coach а№Җаёһаё·а№Ҳаёӯа№Җаёһаёҙа№ҲаёЎ
            </div>
          )}
          {coaches.map(c=>renderCard(c, p=>setCoachForm(p),
            id=>onCoaches(coaches.filter(x=>x.id!==id)), true))}
        </div>
      )}

      {/* STUDENTS */}
      {section==="students"&&(
        <div>
          {studentForm&&renderForm(studentForm, setStudentForm, saveStudent, ()=>setStudentForm(null), false)}
          {!studentForm&&(
            <button onClick={()=>setStudentForm(blankStudent())}
              style={{ width:"100%", padding:"10px 0", borderRadius:8, cursor:"pointer", marginBottom:12,
                border:`1.5px dashed ${T.blue}`, background:T.blueFaint, color:T.blue,
                fontSize:11, fontWeight:700, letterSpacing:"0.08em" }}>+ Add Student</button>
          )}
          {students.length===0&&!studentForm&&(
            <div style={{ textAlign:"center", padding:"24px 0", color:T.muted, fontSize:11 }}>
              аёўаёұаёҮа№„аёЎа№ҲаёЎаёө Student вҖ” аёҒаё” Add Student а№Җаёһаё·а№Ҳаёӯа№Җаёһаёҙа№ҲаёЎ
            </div>
          )}
          {students.map(s=>renderCard(s, p=>setStudentForm(p),
            id=>onStudents(students.filter(x=>x.id!==id)), false))}
        </div>
      )}
    </div>
  );
}

function ShareModal({ scores, sessions, playerName, onClose }) {
  const fs      = calcFitnessStats(scores);
  const cleared  = calcClearedHS(scores);
  const unlocked = calcUnlockedHS(scores);
  const title    = getTitle(scores);
  const basicP   = calcBasicPassed(scores);
  const mastery  = calcMastery(scores);

  const handleShare = async () => {
    const statLine = STATS.map(s=>`${s.label}:${fs[s.id]}`).join(" ");
    const text = `${playerName} вҖ” Moventia Training System\n${title.en} В· Mastery ${mastery}%\n${statLine}\nSessions: ${sessions.length}\n\n#Moventia #MovementTraining #HOYHON`;
    try {
      if (navigator.share) await navigator.share({ title:"Moventia Training System", text });
      else { await navigator.clipboard.writeText(text); alert("аё„аёұаё”аёҘаёӯаёҒа№ҒаёҘа№үаё§ в—Ҳ"); }
    } catch {}
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.70)", zIndex:1000,
                  display:"flex", alignItems:"center", justifyContent:"center", padding:20,
                  backdropFilter:"blur(6px)" }}>
      <div style={{ width:"100%", maxWidth:340 }}>
        <div style={{ background:`linear-gradient(160deg,#1A1A1E 0%,#121214 100%)`,
          border:`1.5px solid ${T.borderGold}`, borderRadius:14, padding:"24px 22px", marginBottom:12,
          boxShadow:"0 8px 32px rgba(0,0,0,0.40), 0 2px 8px rgba(207,163,120,0.10)" }}>
          <div style={{ textAlign:"center", fontSize:9, color:T.gold, letterSpacing:"0.22em", marginBottom:18, fontWeight:700 }}>
            MOVENTIA
          </div>
          <div style={{ textAlign:"center", marginBottom:18 }}>
            <div style={{ fontSize:28, marginBottom:8, color:T.gold }}>в—Ҳ</div>
            <div style={{ fontSize:20, fontWeight:700, color:T.text }}>{playerName}</div>
            <div style={{ fontSize:11, color:T.gold, letterSpacing:"0.09em", marginTop:5, fontWeight:500 }}>
              {title.en} В· {mastery}% Mastery
            </div>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:6, marginBottom:14 }}>
            {STATS.map(s => {
              const v=fs[s.id]||0;
              return (
                <div key={s.id} style={{ background:T.faint, borderRadius:6, padding:"9px 4px",
                  textAlign:"center", border:`1px solid ${T.border}` }}>
                  <div style={{ fontSize:16, fontWeight:700, color:v>=60?T.gold:T.sub }}>{v}</div>
                  <div style={{ fontSize:8, color:T.muted, marginTop:1 }}>{s.label}</div>
                </div>
              );
            })}
          </div>
          <div style={{ display:"flex", justifyContent:"center", gap:7, marginBottom:14 }}>
            {HS_LEVELS.map(lv => {
              const c=cleared.has(lv.id), u=unlocked.has(lv.id);
              return (
                <div key={lv.id} style={{ textAlign:"center" }}>
                  <div style={{ width:30, height:30, borderRadius:6, margin:"0 auto 4px",
                    background:c?T.goldFaint:T.locked,
                    border:`1px solid ${c?T.gold:u?T.borderMd:T.border}`,
                    display:"flex", alignItems:"center", justifyContent:"center",
                    fontSize:9, fontWeight:900, color:c?T.gold:u?T.sub:T.lockedTxt,
                    boxShadow:c?`0 0 8px ${T.goldGlow}`:"none" }}>{lv.icon}</div>
                  <div style={{ fontSize:7, color:c?T.gold:T.muted }}>{c?"PASS":u?"вҶ’":"вҖ”"}</div>
                </div>
              );
            })}
          </div>
          <div style={{ fontSize:8, color:T.muted, textAlign:"center" }}>
            Sessions: {sessions.length} В· Skills: {calcPassedSkills(scores)}/{ALL_SKILLS.length}
          </div>
          <div style={{ fontSize:8, color:T.muted, textAlign:"center", marginTop:5 }}>
            #Moventia #MovementTraining #FitnessTracker
          </div>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <button onClick={handleShare} style={{ flex:1, padding:13,
            background:`linear-gradient(135deg,${T.gold} 0%,${T.goldBright} 100%)`,
            border:"none", borderRadius:8, color:"#FFFFFF",
            fontWeight:700, fontSize:12, letterSpacing:"0.10em", cursor:"pointer",
            boxShadow:"0 2px 10px rgba(184,126,106,0.35)" }}>в—Ҳ  SHARE</button>
          <button onClick={onClose} style={{ padding:"13px 18px", background:T.surface,
            border:`1px solid ${T.border}`, borderRadius:8, color:T.muted, fontSize:12, cursor:"pointer" }}>
            вң•
          </button>
        </div>
      </div>
    </div>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   MAIN APP
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
const STORAGE_KEY = "moventia_app_v1";
function load() {
  try {
    // Try v6 first
    const s6 = localStorage.getItem(STORAGE_KEY);
    if (s6) return upgradeState(JSON.parse(s6));
    // Migrate from v5 if exists
    const s5 = localStorage.getItem("hoyhon_handstand_v5");
    if (s5) return upgradeState(JSON.parse(s5));
  } catch {}
  return { playerName:"Player", coachName:"", scores:{}, sessions:[], programs:[], customExercises:{}, students:[], coaches:[], customSkills:{}, headCoachMode:false };
}

function App() {
  // Initialize migration and auth system on mount
  useEffect(() => {
    migrateOldStorageKeys();
  }, []);

  const [authSession, setAuthSession_] = useState(() => getAuthSession());
  const [showLoginScreen, setShowLoginScreen] = useState(!authSession);
  const [showSetupWizard, setShowSetupWizard] = useState(false);
  const [showUserMgmt, setShowUserMgmt] = useState(false);

  const handleLoginSuccess = useCallback((user, role) => {
    // Read auth directly from localStorage to avoid race condition
    const session = getAuthSession();
    if (session) {
      setAuthSession_(session);
      setShowLoginScreen(false);
    } else {
      // Fallback: construct session from user object
      const fallback = { userId: user.id, username: user.username, role: user.role, loginTime: Date.now(), lastActive: Date.now() };
      setAuthSession_(fallback);
      setShowLoginScreen(false);
    }
  }, []);

  const handleLogout = useCallback(() => {
    logout();
    setAuthSession_(null);
    setShowLoginScreen(true);
  }, []);

  // Check if first-time setup (no users)
  useEffect(() => {
    const { initialized } = initializeAuthSystem();
    if (!initialized && !authSession) {
      setShowLoginScreen(false);
      setShowSetupWizard(true);
    }
  }, [authSession]);

  // ALL hooks must be declared before any conditional return (React rules of hooks)
  const [state, setState]   = useState(load);
  const [tab, setTab]       = useState("home");
  const [showShare, setShare] = useState(false);
  const [savedSnap, setSavedSnap] = useState(null);
  // Language toggle
  const [lang, setLang]     = useState("th");
  const toggleLang = useCallback(() => setLang(l => l === "th" ? "en" : "th"), []);
  // Global selected student вҖ” synced across all tabs
  const [selectedStudent, setSelectedStudent] = useState("");
  const handleSelectStudent = useCallback((name) => {
    setSelectedStudent(name);
    // Also sync playerName so CoachTab scores go to the right student
    setState(p => ({ ...p, playerName: name || p.playerName }));
  }, []);

  useEffect(() => { if (authSession) localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }, [state, authSession]);

  const setScore = useCallback((skillId, val) => {
    setState(p => ({ ...p, scores:{ ...p.scores, [skillId]:val } }));
  }, []);

  const saveSession = useCallback(({ date, note, coachName }) => {
    const snap = state.scores;
    const mastery = calcMastery(snap);
    const passedSkills = calcPassedSkills(snap);
    const newSession = {
      id: state.sessions.length + 1, type:"personal", date, note,
      playerName: state.playerName || "Player",
      coachName: coachName || "",
      mastery, passedSkills, scoreSnapshot: { ...snap },
    };
    setState(p => ({ ...p, sessions: [...p.sessions, newSession], scores: {} }));
    setSavedSnap({ type:"personal", mastery, passedSkills });
    setTimeout(() => { setSavedSnap(null); setTab("home"); }, 2400);
  }, [state.scores, state.sessions.length]);

  const saveGroupSession = useCallback(({ date, note, coachName, progId, progName, exercises }) => {
    const newSession = {
      id: state.sessions.length + 1, type:"group", date, note,
      coachName: coachName || "",
      programId: progId, programName: progName,
      programSnapshot: exercises,
    };
    setState(p => ({ ...p, sessions: [...p.sessions, newSession] }));
    setSavedSnap({ type:"group", programName: progName });
    setTimeout(() => { setSavedSnap(null); setTab("history"); }, 1800);
  }, [state.sessions.length]);

  // Update last active time on any interaction
  useEffect(() => {
    const handleActivity = () => updateLastActive();
    window.addEventListener('click', handleActivity);
    window.addEventListener('keydown', handleActivity);
    return () => {
      window.removeEventListener('click', handleActivity);
      window.removeEventListener('keydown', handleActivity);
    };
  }, []);

  // Compute derived state (safe even when not logged in)
  const title    = authSession ? getTitle(state.scores) : { en:"Guest", th:"Guest" };
  const unlocked = authSession ? calcUnlockedHS(state.scores) : 0;
  const mastery  = authSession ? calcMastery(state.scores) : 0;

  // Filter tabs based on role
  let TABS = [
    { id:"home",     label:"HOME",    emoji:"в—Ҳ" },
    { id:"skills",   label:"SKILLS",  emoji:"в—ү" },
  ];

  // === CONDITIONAL RENDERING (no early returns вҖ” all hooks already called) ===

  // Show SetupWizard if first time
  if (!authSession && showSetupWizard) {
    return (
      <LangContext.Provider value={lang}>
        <SetupWizard
          onSetupComplete={(user, role) => {
            const session = getAuthSession();
            if (session) {
              setAuthSession_(session);
            } else {
              setAuthSession_({ userId: user.id, username: user.username, role: role || 'owner', loginTime: Date.now(), lastActive: Date.now() });
            }
            setShowSetupWizard(false);
          }}
        />
      </LangContext.Provider>
    );
  }

  // Show LoginScreen if not authenticated
  if (!authSession) {
    return (
      <LangContext.Provider value={lang}>
        <LoginScreen
          onLoginSuccess={handleLoginSuccess}
          onShowSetup={() => setShowSetupWizard(true)}
        />
      </LangContext.Provider>
    );
  }

  // Show saved session screen
  if (savedSnap) return <SavedScreen type={savedSnap.type} mastery={savedSnap.mastery}
    passedSkills={savedSnap.passedSkills} programName={savedSnap.programName}/>;

  if (authSession.role === 'owner') {
    TABS.push(
      { id:"coach",    label:"COACH",   emoji:"вҠ•" },
      { id:"history",  label:"HISTORY", emoji:"в—Һ" },
      { id:"admin",    label:"ADMIN",   emoji:"вҡ”" },
      { id:"settings", label:"REGIS",   emoji:"вҡҷ" }
    );
  } else if (authSession.role === 'head_coach') {
    TABS.push(
      { id:"coach",    label:"COACH",   emoji:"вҠ•" },
      { id:"history",  label:"HISTORY", emoji:"в—Һ" },
      { id:"settings", label:"REGIS",   emoji:"вҡҷ" }
    );
  } else if (authSession.role === 'coach') {
    TABS.push(
      { id:"coach",    label:"COACH",   emoji:"вҠ•" },
      { id:"history",  label:"HISTORY", emoji:"в—Һ" },
      { id:"settings", label:"REGIS",   emoji:"вҡҷ" }
    );
  } else if (authSession.role === 'student') {
    TABS.push(
      { id:"mypackage", label:"MY PKG", emoji:"рҹ“Ұ" },
      { id:"book",      label:"BOOK",   emoji:"рҹ“…" },
      { id:"history",   label:"HISTORY", emoji:"в—Һ" }
    );
  }

  return (
    <LangContext.Provider value={lang}>
    <div style={{ background:T.bg, minHeight:"100vh", color:T.text,
                  fontFamily:"'Inter','SF Pro Display','-apple-system','Helvetica Neue',system-ui,sans-serif",
                  maxWidth:460, margin:"0 auto" }}>

      {/* HEADER */}
      <div style={{ background:T.bg2, borderBottom:`1px solid ${T.border}`,
                    padding:"16px 16px 0", boxShadow:"0 1px 6px rgba(0,0,0,0.06)" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
          <div>
            <div style={{ fontSize:17, fontWeight:900, letterSpacing:"0.24em",
              backgroundImage:T.metal, WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }}>
              MOVENTIA
            </div>
            <div style={{ fontSize:9, color:T.gold, letterSpacing:"0.16em", marginTop:2, fontWeight:500 }}>
              {authSession.username} ({authSession.role})
            </div>
          </div>
          <div style={{ display:"flex", gap:6, alignItems:"center" }}>
            <button onClick={toggleLang} style={{
              ...btnBase, padding:"6px 10px", fontSize:9, fontWeight:700,
              letterSpacing:"0.06em", boxShadow:T.cardShadow,
              background:T.surface, color:T.sub }}>
              {lang==="th"?"рҹҮ№рҹҮӯ TH":"рҹҮ¬рҹҮ§ EN"}
            </button>
            {authSession.role !== 'student' && (
              <button onClick={()=>setShare(true)} style={{
                ...btnBase, padding:"7px 12px", fontSize:10, boxShadow:T.cardShadow }}>
                в—Ҳ Share
              </button>
            )}
            <button onClick={handleLogout} style={{
              ...btnBase, padding:"6px 10px", fontSize:9, fontWeight:700,
              letterSpacing:"0.06em", boxShadow:T.cardShadow,
              background:T.crimsonFaint, color:T.crimson }}>
              рҹҡӘ Logout
            </button>
          </div>
        </div>

        {/* Status strip вҖ” clean chip layout */}
        <div style={{ display:"flex", gap:6, marginBottom:12, flexWrap:"wrap" }}>
          <span style={{ fontSize:9, padding:"3px 9px", borderRadius:5, fontWeight:700,
            background:T.goldFaint, border:`1px solid ${T.borderGold}`, color:T.gold }}>
            {title.en}
          </span>
          <span style={{ fontSize:9, padding:"3px 9px", borderRadius:5, fontWeight:600,
            background:T.faint, border:`1px solid ${T.border}`, color:T.sub }}>
            Lv {Math.max(...Array.from(unlocked))}
          </span>
          <span style={{ fontSize:9, padding:"3px 9px", borderRadius:5, fontWeight:600,
            background:T.faint, border:`1px solid ${T.border}`, color:T.sub }}>
            {state.sessions.length} sessions
          </span>
          <span style={{ fontSize:9, padding:"3px 9px", borderRadius:5, fontWeight:600,
            background:T.faint, border:`1px solid ${T.border}`, color:T.sub }}>
            {mastery}% mastery
          </span>
        </div>

        {/* Active student indicator */}
        {selectedStudent && (()=>{
          const stu = (state.students||[]).find(s=>s.name===selectedStudent);
          return (
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10,
              padding:"6px 12px", borderRadius:7, background:T.goldFaint,
              border:`1px solid ${T.borderGold}` }}>
              {stu?.avatar ? (
                <div style={{ width:22, height:22, borderRadius:"50%", flexShrink:0, overflow:"hidden",
                  border:`1.5px solid ${T.borderGold}` }}>
                  <img src={stu.avatar} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }}/>
                </div>
              ) : <span style={{ fontSize:12 }}>в—Ӣ</span>}
              <span style={{ fontSize:10, fontWeight:700, color:T.gold, flex:1 }}>
                аёҒаёіаёҘаёұаёҮаё”аё№: {selectedStudent}
              </span>
              <button onClick={()=>{ setSelectedStudent(""); setState(p=>({...p,playerName:""})); }}
                style={{ padding:"3px 8px", borderRadius:5, border:`1px solid ${T.borderGold}`,
                  background:"transparent", color:T.gold, fontSize:8, fontWeight:700,
                  cursor:"pointer", letterSpacing:"0.06em" }}>вң• аёўаёҒа№ҖаёҘаёҙаёҒ</button>
            </div>
          );
        })()}

        {/* Tab bar */}
        <div style={{ display:"flex", marginBottom:-1 }}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              flex:1, padding:"9px 2px", background:"none", border:"none",
              borderBottom: tab===t.id?`2px solid ${T.gold}`:"2px solid transparent",
              color: tab===t.id?T.gold:T.muted,
              fontSize:8, fontWeight:700, letterSpacing:"0.10em", cursor:"pointer", whiteSpace:"nowrap",
            }}>
              <div style={{ fontSize:14, marginBottom:2 }}>{t.emoji}</div>
              {t.label}
            </button>
          ))}
        </div>
      </div>

      {/* CONTENT */}
      <div>
        {tab==="home"    && <HomeTab    scores={state.scores} sessions={state.sessions} students={state.students||[]}
            selectedStudent={selectedStudent} onSelectStudent={handleSelectStudent}/>}
        {tab==="skills"  && (
          <SkillsTab scores={state.scores}
            customSkills={state.customSkills||{}}
            headCoachMode={state.headCoachMode||false}
            onAddSkill={(groupId, skill)=>setState(p=>({
              ...p, customSkills:{ ...p.customSkills,
                [groupId]:[...(p.customSkills[groupId]||[]), skill] }}))}
            onDeleteSkill={(groupId, skillId)=>setState(p=>({
              ...p, customSkills:{ ...p.customSkills,
                [groupId]:(p.customSkills[groupId]||[]).filter(s=>s.id!==skillId) }}))}
            students={state.students||[]} sessions={state.sessions||[]}
            selectedStudent={selectedStudent} onSelectStudent={handleSelectStudent}/>
        )}
        {tab==="coach"   && (
          <CoachTab scores={state.scores} onScore={setScore}
            playerName={state.playerName}
            onNameChange={n=>{ setState(p=>({...p,playerName:n})); setSelectedStudent(n); }}
            coachName={state.coachName}
            onCoachNameChange={n=>setState(p=>({...p,coachName:n}))}
            onSaveSession={saveSession}
            programs={state.programs||[]}
            onPrograms={progs=>setState(p=>({...p,programs:progs}))}
            onSaveGroup={saveGroupSession}
            customExercises={state.customExercises||{}}
            onCustomExercises={cx=>setState(p=>({...p,customExercises:cx}))}
            customSkills={state.customSkills||{}}
            headCoachMode={state.headCoachMode||false}
            students={state.students||[]}
            coaches={state.coaches||[]}
            sessions={state.sessions||[]}/>
        )}
        {tab==="history"  && <HistoryTab sessions={state.sessions}/>}
        {tab==="settings" && (
          <SettingsTab
            headCoachMode={state.headCoachMode||false}
            onHeadCoachMode={v=>setState(p=>({...p,headCoachMode:v}))}
            coaches={state.coaches||[]}
            onCoaches={cs=>setState(p=>({...p,coaches:cs}))}
            students={state.students||[]}
            onStudents={ss=>setState(p=>({...p,students:ss}))}/>
        )}
        {tab==="admin" && (
          <div style={{ padding:'16px' }}>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
              <button
                onClick={() => setShowUserMgmt(true)}
                style={{
                  padding:'20px', borderRadius:10, border:`1px solid ${T.borderGold}`,
                  background:T.surface, color:T.gold, fontSize:12, fontWeight:700,
                  cursor:'pointer', textAlign:'center'
                }}
              >
                рҹ‘Ҙ Users
              </button>
              <button style={{
                padding:'20px', borderRadius:10, border:`1px solid ${T.borderBlue}`,
                background:T.surface, color:T.blue, fontSize:12, fontWeight:700,
                cursor:'pointer', textAlign:'center'
              }}>
                рҹ“Ұ Packages
              </button>
              <button style={{
                padding:'20px', borderRadius:10, border:`1px solid ${T.borderGreen}`,
                background:T.surface, color:T.green, fontSize:12, fontWeight:700,
                cursor:'pointer', textAlign:'center'
              }}>
                рҹ’і Payments
              </button>
              <button style={{
                padding:'20px', borderRadius:10, border:`1px solid ${T.borderPurple}`,
                background:T.surface, color:T.purple, fontSize:12, fontWeight:700,
                cursor:'pointer', textAlign:'center'
              }}>
                рҹ“Ҡ Export
              </button>
            </div>
            {showUserMgmt && (
              <div style={{
                position:'fixed', top:0, left:0, right:0, bottom:0,
                background:'rgba(0,0,0,0.8)', display:'flex', alignItems:'flex-end', zIndex:999
              }}>
                <div style={{
                  width:'100%', maxWidth:460, background:T.bg2, borderRadius:'16px 16px 0 0',
                  maxHeight:'80vh', overflowY:'auto'
                }}>
                  <UserManagement
                    currentRole={authSession.role}
                    onClose={() => setShowUserMgmt(false)}
                  />
                </div>
              </div>
            )}
          </div>
        )}
        {tab==="mypackage" && (
          <div style={{ padding:'16px' }}>
            <div style={{ padding:'12px', borderRadius:8, border:`1px solid ${T.borderGold}`,
              background:T.goldFaint, color:T.gold, fontSize:12, textAlign:'center' }}>
              My Package feature coming soon
            </div>
          </div>
        )}
        {tab==="book" && (
          <div style={{ padding:'16px' }}>
            <div style={{ padding:'12px', borderRadius:8, border:`1px solid ${T.borderGold}`,
              background:T.goldFaint, color:T.gold, fontSize:12, textAlign:'center' }}>
              Class Booking feature coming soon
            </div>
          </div>
        )}
      </div>

      {showShare && (
        <ShareModal scores={state.scores} sessions={state.sessions}
          playerName={state.playerName} onClose={()=>setShare(false)}/>
      )}
    </div>
    </LangContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
