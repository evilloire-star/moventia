const AuthContext = createContext(null);
function useAuth() { return useContext(AuthContext); }

const AUTH_TIMEOUT = 30 * 60 * 1000; // 30 minutes

function generateUserId() { return 'user_' + Math.random().toString(36).substr(2, 9); }

function hashPin(pin) {
  // Simple hash for PIN storage (not cryptographic, just for obfuscation)
  return btoa(pin + 'mvt_salt_2025');
}

function initializeAuthSystem() {
  // Check if any users exist
  const users = JSON.parse(localStorage.getItem('mvt_users') || '{}');
  if (Object.keys(users).length === 0) {
    // No users exist - this is first-time setup
    return { initialized: false, users: {} };
  }
  return { initialized: true, users };
}

function migrateOldStorageKeys() {
  // Migrate from old keys to new mvt_ prefixed keys
  const oldScoresKey = 'moventia_scores';
  const oldSessionsKey = 'moventia_sessions';

  const oldScores = localStorage.getItem(oldScoresKey);
  const oldSessions = localStorage.getItem(oldSessionsKey);

  // Mark migration as done to avoid re-running
  const migrated = localStorage.getItem('mvt_migration_done');
  if (migrated) return;

  // If old data exists, it belongs to a default student (e.g., 'Player')
  if (oldScores) {
    try {
      const scores = JSON.parse(oldScores);
      localStorage.setItem('mvt_scores_player', JSON.stringify(scores));
    } catch {}
  }
  if (oldSessions) {
    try {
      const sessions = JSON.parse(oldSessions);
      localStorage.setItem('mvt_sessions_player', JSON.stringify(sessions));
    } catch {}
  }

  localStorage.setItem('mvt_migration_done', '1');
}

function getAuthSession() {
  try {
    const session = JSON.parse(localStorage.getItem('mvt_auth') || 'null');
    if (!session) return null;

    // Check if session has expired (30 min inactivity)
    const now = Date.now();
    if (now - session.lastActive > AUTH_TIMEOUT) {
      localStorage.removeItem('mvt_auth');
      return null;
    }

    return session;
  } catch {
    return null;
  }
}

function setAuthSession(user, role) {
  const session = {
    userId: user.id,
    username: user.username,
    role: role,
    loginTime: Date.now(),
    lastActive: Date.now(),
  };
  localStorage.setItem('mvt_auth', JSON.stringify(session));
  return session;
}

function updateLastActive() {
  try {
    const session = JSON.parse(localStorage.getItem('mvt_auth') || 'null');
    if (session) {
      session.lastActive = Date.now();
      localStorage.setItem('mvt_auth', JSON.stringify(session));
    }
  } catch {}
}

function logout() {
  localStorage.removeItem('mvt_auth');
}

function createUser(username, pin, role, name) {
  const id = generateUserId();
  const users = JSON.parse(localStorage.getItem('mvt_users') || '{}');

  users[id] = {
    id,
    username,
    pinHash: hashPin(pin),
    role,
    name,
    createdAt: Date.now(),
    suspended: false,
    assignedStudents: [], // For coaches: array of student IDs they manage
    assignedCoach: null, // For students: which coach manages them
  };

  localStorage.setItem('mvt_users', JSON.stringify(users));
  return users[id];
}

function verifyCredentials(username, pin) {
  const users = JSON.parse(localStorage.getItem('mvt_users') || '{}');

  for (const [id, user] of Object.entries(users)) {
    if (user.username === username && !user.suspended) {
      if (user.pinHash === hashPin(pin)) {
        return user;
      }
    }
  }

  return null;
}

function getUsers(filterRole = null) {
  const users = JSON.parse(localStorage.getItem('mvt_users') || '{}');
  const list = Object.values(users);
  return filterRole ? list.filter(u => u.role === filterRole) : list;
}

function updateUser(userId, updates) {
  const users = JSON.parse(localStorage.getItem('mvt_users') || '{}');
  if (users[userId]) {
    users[userId] = { ...users[userId], ...updates };
    if (updates.pinHash === undefined && updates.pin) {
      users[userId].pinHash = hashPin(updates.pin);
      delete users[userId].pin;
    }
    localStorage.setItem('mvt_users', JSON.stringify(users));
    return users[userId];
  }
  return null;
}

function suspendUser(userId) {
  return updateUser(userId, { suspended: true });
}

function calcFitnessStats(scores) {
  const totals = { str:0, agi:0, int:0, crd:0, rec:0, flx:0 };
  const maxes  = { str:0, agi:0, int:0, crd:0, rec:0, flx:0 };
  for (const sk of ALL_SKILLS) {
    const s = getEffectiveScore(scores[sk.id]);
    for (const [stat, w] of Object.entries(sk.stats)) {
      totals[stat] += s * w; maxes[stat] += 10 * w;
    }
  }
  const r = {};
  for (const id of Object.keys(totals))
    r[id] = maxes[id] > 0 ? Math.round((totals[id] / maxes[id]) * 100) : 0;
  return r;
}
function calcUnlockedHS(scores) {
  const u = new Set([1]);
  for (let i = 0; i < HS_LEVELS.length - 1; i++) {
    const lv = HS_LEVELS[i];
    if (lv.skills.every(s => getEffectiveScore(scores[s.id]) >= lv.passScore)) u.add(lv.id + 1);
  }
  return u;
}
function calcClearedHS(scores) {
  return new Set(HS_LEVELS.filter(lv =>
    lv.skills.every(s => getEffectiveScore(scores[s.id]) >= lv.passScore)
  ).map(lv => lv.id));
}

function calcUnlockedTrack(levels, scores) {
  const u = new Set([1]);
  for (let i = 0; i < levels.length - 1; i++) {
    const lv = levels[i];
    if (lv.skills.every(s => getEffectiveScore(scores[s.id]) >= lv.passScore)) u.add(lv.id + 1);

  return u;
}
function calcClearedTrack(levels, scores) {
  return new Set(levels.filter(lv =>
    lv.skills.every(s => getEffectiveScore(scores[s.id]) >= lv.passScore)
  ).map(lv => lv.id));
}
function calcBasicPassed(scores) {
  return BASIC_GROUPS.reduce((acc, g) => {
    acc[g.id] = g.skills.filter(s => getEffectiveScore(scores[s.id]) >= g.passScore).length;
    return acc;
  }, {});
}
function calcMastery(scores) {
  const total = ALL_SKILLS.reduce((sum, sk) => sum + getEffectiveScore(scores[sk.id]), 0);
  return Math.round(total / (ALL_SKILLS.length * 10) * 100);
}
function calcPassedSkills(scores) {
  return ALL_SKILLS.filter(s => getEffectiveScore(scores[s.id]) >= 6).length;
}
function getTitle(scores) {
  const hsCleared = calcClearedHS(scores).size;
  const asCleared = calcClearedAS(scores).size;
  const hpCleared = calcClearedTrack(HOOP_LEVELS, scores).size;
  const skCleared = calcClearedTrack(SILK_LEVELS, scores).size;
  const hmCleared = calcClearedTrack(HAMMOCK_LEVELS, scores).size;
  const rpCleared = calcClearedTrack(ROPE_LEVELS, scores).size;
  const stCleared = calcClearedTrack(STR_LEVELS, scores).size;
  const fxCleared = calcClearedTrack(FLEX_LEVELS, scores).size;
  const aerialMax = Math.max(hpCleared, skCleared, hmCleared, rpCleared, asCleared);
  const totalCleared = hsCleared + asCleared + hpCleared + skCleared + hmCleared + rpCleared + stCleared + fxCleared;
  const basicPassed = BASIC_GROUPS.every(g => g.skills.every(s => getEffectiveScore(scores[s.id]) >= g.passScore));
  if (totalCleared >= 28)                      return { en:"Moventia Elite",          th:"Moventia Elite" };
  if (totalCleared >= 20)                      return { en:"Grand Master",            th:"аёӣаёЈаёЎаёІаёҲаёІаёЈаёўа№Ңа№ғаё«аёҚа№Ҳ" };
  if (totalCleared >= 14)                      return { en:"Multi-Discipline Master", th:"аёӣаёЈаёЎаёІаёҲаёІаёЈаёўа№Ңаё«аёҘаёІаёўаёӘаёІаёў" };
  if (hsCleared >= 4 || aerialMax >= 4)        return { en:"Discipline Athlete",      th:"аёҷаёұаёҒаёҒаёөаё¬аёІа№ҖаёүаёһаёІаё°аё—аёІаёҮ" };
  if (totalCleared >= 8)                       return { en:"Advanced Practitioner",   th:"аёңаё№а№үаёқаё¶аёҒаёӮаёұа№үаёҷаёӘаё№аёҮ" };
  if (totalCleared >= 4)                       return { en:"Intermediate",            th:"аёЈаё°аё”аёұаёҡаёҒаёҘаёІаёҮ" };
  if (totalCleared >= 1)                       return { en:"Beginner",                th:"аёңаё№а№үа№ҖаёЈаёҙа№ҲаёЎаё•а№үаёҷ" };

}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   SCORE DECAY HELPERS
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function daysSince(dateStr) {
  if (!dateStr) return 999;
  return Math.max(0, Math.floor((new Date() - new Date(dateStr)) / 86400000));
}
function getEffectiveScore(skillData) {
  if (!skillData) return 0;
  if (typeof skillData === "number") return skillData;
  const raw = skillData.score || 0;
  if (!raw || !skillData.lastTested) return raw;
  const days = daysSince(skillData.lastTested);
  if (days <= 60) return raw;
  return Math.max(0, raw - Math.floor((days - 60) / 30));
}
function getDecayInfo(skillData) {
  if (!skillData || typeof skillData === "number") return null;
  const { score, lastTested } = skillData;
  if (!score || !lastTested) return null;
  const days = daysSince(lastTested);
  if (days <= 30) return { status:"fresh", badge:null };
  if (days <= 60) return { status:"check", badge:"в—”", daysLeft: 60 - days };
  const monthsDecay = Math.floor((days - 60) / 30);
  return { status:"fading", badge:"вҡ ", days, monthsDecay, effective: Math.max(0, score - monthsDecay) };
}
function guessUsesReps(skill) {
  return !/\d+s\b/i.test(skill.name);
}
function upgradeState(raw) {
  const scores = {};
  for (const [id, val] of Object.entries(raw.scores || {})) {
    scores[id] = typeof val === "number"
      ? { score: val, lastTested: today(), sets: 1, useReps: true, reps: "", duration: "", bodyWeight: true, weight: 0, photos: [] }
      : { photos: [], ...val };   // ensure photos exists on any older object
  }
  return { coachName: "", programs: [], customExercises: {}, students: [], coaches: [], customSkills: {}, headCoachMode: false, ...raw, scores };
}

/* в”Җв”Җ Find a student's latest personal session (by name) в”Җв”Җ */
function findLastSession(sessions, studentName) {
  if (!studentName) return null;
  const nm = studentName.trim().toLowerCase();
  for (let i = sessions.length - 1; i >= 0; i--) {
    const s = sessions[i];
    if (s.type === "personal" && (s.playerName || "").trim().toLowerCase() === nm) return s;
  }
  return null;
}
function getStudentPrevScores(sessions, studentName) {
  const sess = findLastSession(sessions, studentName);
  return sess?.scoreSnapshot || {};
}

   RING (circular progress вҖ” adapted for light theme)
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function Ring({ value, max, color, size=80, stroke=7, label="" }) {
  const r    = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const p    = Math.min(100, Math.round((value / Math.max(max, 1)) * 100));
  const off  = circ - (p / 100) * circ;
  const done = p >= 100;
  return (
    <div style={{ position:"relative", width:size, height:size, flexShrink:0 }}>
      <svg width={size} height={size} style={{ transform:"rotate(-90deg)", display:"block" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none"
          stroke="rgba(0,0,0,0.08)" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none"
          stroke={color} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"
          style={{ transition:"stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)",
            filter:`drop-shadow(0 0 ${done?7:3}px ${color}66)` }}/>
      </svg>
      <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column",
                    alignItems:"center", justifyContent:"center", gap:1 }}>
        <span style={{ fontSize:13, fontWeight:900, color, lineHeight:1 }}>{p}%</span>
        {label && <span style={{ fontSize:7, color:T.muted, textAlign:"center", lineHeight:1.2, maxWidth:size-14 }}>{label}</span>}
      </div>
    </div>
  );
}

   HEXAGON RADAR (6 stats)
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function RadarChart({ fs, size=180 }) {
  const cx = size/2, cy = size/2 + 4, R = size * 0.31;
  const n = STATS.length;
  const ang = i => (Math.PI*2*i/n) - Math.PI/2;
  const pt  = (i, r) => ({ x: cx + r*Math.cos(ang(i)), y: cy + r*Math.sin(ang(i)) });
  const poly = pts => pts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  const outerPts = STATS.map((_,i)=>pt(i,R));
  const valPts   = STATS.map((s,i)=>pt(i, R * Math.min(100,fs[s.id]||0)/100));
  return (
    <svg width={size} height={size+14} style={{ display:"block", margin:"0 auto" }}>
      {[0.33,0.66,1].map((p,gi)=>(
        <polygon key={gi} points={poly(STATS.map((_,i)=>pt(i,R*p)))}
          fill="none" stroke={gi===2?"rgba(0,0,0,0.12)":"rgba(0,0,0,0.06)"}
          strokeWidth={gi===2?1.2:0.7}/>
      ))}
      {outerPts.map((ep,i)=>(
        <line key={i} x1={cx} y1={cy} x2={ep.x} y2={ep.y} stroke="rgba(0,0,0,0.07)" strokeWidth={0.8}/>
      ))}
      <polygon points={poly(valPts)} fill={T.goldFaint} stroke={T.gold} strokeWidth={1.8}/>
      {valPts.map((p,i)=> (fs[STATS[i].id]||0)>0 &&
        <circle key={i} cx={p.x} cy={p.y} r={3.5} fill={T.gold}
          style={{ filter:`drop-shadow(0 0 4px ${T.goldGlow})` }}/>
      )}
      {STATS.map((s,i)=>{
        const ep = pt(i, R+22);
        const v  = fs[s.id]||0;
        const anchor = ep.x>cx+10?"start":ep.x<cx-10?"end":"middle";
        return (
          <g key={i}>
            <text x={ep.x} y={ep.y-3} textAnchor={anchor}
              fill={T.muted} fontSize={8} fontWeight={700} letterSpacing="0.10em">{s.label}</text>
            <text x={ep.x} y={ep.y+8} textAnchor={anchor}
              fill={v>=60?T.gold:v>=30?T.sub:T.muted} fontSize={10} fontWeight={900}>{v}</text>
          </g>
        );
      })}
    </svg>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   STEPPER (numeric +/- input)
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function Stepper({ value, onChange, min=0, max=999, step=1, suffix="" }) {
  const [raw, setRaw] = useState(String(value ?? ""));
  useEffect(() => { setRaw(String(value ?? "")); }, [value]);
  const commit = (str) => {
    const n = parseFloat(String(str).replace(/[^\d.-]/g, ""));
    if (!isNaN(n)) {
      const clamped = Math.min(max, Math.max(min, n));
      onChange(step < 1 ? +clamped.toFixed(2) : Math.round(clamped));
    } else setRaw(String(value ?? ""));
  };
  return (
    <div style={{ display:"flex", alignItems:"center", gap:6 }}>
      <button onClick={()=>onChange(Math.max(min, +(+value-step).toFixed(2)))}
        style={{ ...btnBase, width:30, height:30, fontSize:16, color:T.muted,
          boxShadow:"0 1px 3px rgba(0,0,0,0.07)" }}>вҲ’</button>
      <input
        type="number" value={raw} inputMode="decimal"
        onChange={e=>setRaw(e.target.value)}
        onBlur={e=>commit(e.target.value)}
        onKeyDown={e=>e.key==="Enter" && commit(raw)}
        style={{ width:54, textAlign:"center", fontSize:14, fontWeight:700,
          color:T.text, background:T.bg, border:`1px solid ${T.borderMd}`,
          borderRadius:6, padding:"5px 2px", outline:"none", fontFamily:"inherit",
          WebkitAppearance:"none", MozAppearance:"textfield" }}/>
      <button onClick={()=>onChange(Math.min(max, +(+value+step).toFixed(2)))}
        style={{ ...btnBase, width:30, height:30, fontSize:16, color:T.gold,
          boxShadow:"0 1px 3px rgba(0,0,0,0.07)" }}>+</button>
      {suffix && <span style={{ fontSize:10, color:T.muted, fontWeight:500 }}>{suffix}</span>}
    </div>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   SKILL ROW  (supports expandable coach panel + decay)
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function SkillRow({ skill, skillData, unlocked, coachMode, onScore, passScore, accentColor, prevSkillData }) {
  const score  = getEffectiveScore(skillData);
  const rawSc  = (typeof skillData === "object" && skillData?.score) || 0;
  const decay  = getDecayInfo(skillData);
  const passed = score >= passScore, scored = score > 0;
  const dotBg  = !unlocked ? T.lockedTxt : passed ? accentColor : scored ? T.silver : T.border;

  const [open, setOpen] = useState(false);
  const initDraft = () => {
    const d = (typeof skillData === "object" && skillData) ? skillData : {};
    return {
      sets:       d.sets        ?? 1,
      useReps:    d.useReps     ?? guessUsesReps(skill),
      reps:       d.reps        != null ? d.reps : "",
      duration:   d.duration    != null ? d.duration : "",
      bodyWeight: d.bodyWeight  ?? true,
      weight:     d.weight      ?? 0,
      score:      typeof skillData === "number" ? skillData : (skillData?.score || 0),
      photos:     d.photos      ?? [],
    };
  };
  const [draft, setDraft] = useState(initDraft);
  useEffect(() => { if (!open) setDraft(initDraft()); }, [skillData, open]);

  const handleApply = () => {
    onScore(skill.id, {
      score:      draft.score,
      lastTested: today(),
      sets:       draft.sets,
      reps:       draft.useReps ? (parseInt(draft.reps) || 0) : null,
      duration:   !draft.useReps ? (parseInt(draft.duration) || 0) : null,
      useReps:    draft.useReps,
      bodyWeight: draft.bodyWeight,
      weight:     draft.bodyWeight ? 0 : draft.weight,
      photos:     draft.photos,
    });
    setOpen(false);
  };

  const decayColor  = decay?.status === "fading" ? "#DC3545" : "#D07000";
  const decayBg     = decay?.status === "fading" ? "rgba(220,53,69,0.09)" : "rgba(208,112,0,0.09)";
  const decayBorder = decay?.status === "fading" ? "rgba(220,53,69,0.28)" : "rgba(208,112,0,0.28)";

  // Get top 2 stats by weight
  const topStats = Object.entries(skill.stats)
    .sort(([,wa],[,wb]) => wb - wa)
    .slice(0, 2);

  // Format last tested display
  const lastTestedStr = skillData?.lastTested ? `${daysSince(skillData.lastTested)}d ago` : null;

  return (
    <div style={{ borderBottom:`1px solid ${T.divider}`, opacity:unlocked?1:0.35 }}>
      {/* в”Җв”Җ Main row вҖ” Compact card layout в”Җв”Җ */}
      <div style={{ padding:"10px 16px" }}>
        <div style={{ display:"flex", alignItems:"flex-start", gap:10 }}>
          {/* Left accent border */}
          <div style={{ width:3, flexShrink:0, borderRadius:1.5,
            background:!unlocked?T.border:passed?accentColor:scored?T.silver:T.border,
            boxShadow:passed?`0 0 8px ${accentColor}40`:"none" }}/>

          <div style={{ flex:1, minWidth:0 }}>
            {/* Header: name + status badge */}
            <div style={{ display:"flex", alignItems:"center", gap:7, flexWrap:"wrap", marginBottom:4 }}>
              <span style={{ fontSize:12, fontWeight:600, color:passed?T.text:T.sub }}>{skill.name}</span>
              {!scored && <span style={{ fontSize:9, color:T.muted }}>{skill.thai}</span>}
              {decay?.badge && (
                <span style={{ fontSize:8, padding:"1px 6px", borderRadius:3, fontWeight:700,
                  background:decayBg, color:decayColor, border:`1px solid ${decayBorder}` }}>
                  {decay.badge} {decay.status==="fading"
                    ? `вҲ’${decay.monthsDecay}pt`
                    : `${decay.daysLeft}d left`}
                </span>
              )}
              {passed && (
                <span style={{ fontSize:8, padding:"2px 6px", borderRadius:3, fontWeight:700,
                  background:accentColor+"18", color:accentColor, border:`1px solid ${accentColor}40` }}>
                  вң“ PASS
                </span>
              )}
            </div>

            {/* Score + stat badges row */}
            {scored && (
              <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:4, flexWrap:"wrap" }}>
                {/* Score ring */}
                <div style={{ position:"relative", width:32, height:32, flexShrink:0 }}>
                  <svg width="32" height="32" style={{ transform:"rotate(-90deg)" }}>
                    <circle cx="16" cy="16" r="14" fill="none" stroke={T.border} strokeWidth="2"/>
                    <circle cx="16" cy="16" r="14" fill="none" stroke={accentColor}
                      strokeWidth="2" strokeDasharray={`${(score/10)*88} 88`}
                      style={{ transition:"stroke-dasharray 0.5s" }}/>
                  </svg>
                  <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center",
                    justifyContent:"center", fontSize:11, fontWeight:700, color:accentColor }}>
                    {score}
                  </div>
                </div>

                {/* Top 2 stat badges */}
                {topStats.map(([stat, weight]) => (
                  <span key={stat} style={{ fontSize:8, padding:"3px 6px", borderRadius:4, fontWeight:700,
                    background:`${accentColor}15`, color:accentColor, border:`1px solid ${accentColor}40`,
                    whiteSpace:"nowrap" }}>
                    {stat.toUpperCase()} {Math.round(weight*10)}%
                  </span>
                ))}

                {/* Last tested badge */}
                {lastTestedStr && (
                  <span style={{ fontSize:8, padding:"3px 6px", borderRadius:4, fontWeight:600,
                    background:T.faint, color:T.muted, border:`1px solid ${T.border}`,
                    whiteSpace:"nowrap" }}>
                    {lastTestedStr}
                  </span>
                )}
              </div>
            )}

            {/* Description */}
            {scored && <div style={{ fontSize:9, color:T.muted, marginBottom:4 }}>{skill.desc}</div>}

            {/* в”Җв”Җ Skills tab: progress + training record в”Җв”Җ */}
            {unlocked && !coachMode && (
              <div style={{ marginTop:3 }}>
                {/* Training record card */}
                {skillData?.lastTested ? (
                  <div style={{ marginTop:2, padding:"6px 10px", borderRadius:6,
                    background:passed?"rgba(100,160,122,0.06)":T.faint,
                    border:`1px solid ${passed?"rgba(100,160,122,0.18)":T.border}` }}>
                    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:3 }}>
                      <span style={{ fontSize:9, fontWeight:700, color:passed?T.green:T.sub }}>
                        в–Ј аёӣаёЈаё°аё§аёұаё•аёҙаёҘа№ҲаёІаёӘаёёаё”
                      </span>
                      <span style={{ fontSize:8, color:T.muted }}>
                        в–Ј {skillData.lastTested} ({daysSince(skillData.lastTested)} аё§аёұаёҷаё—аёөа№Ҳа№ҒаёҘа№үаё§)
                      </span>
                    </div>
                    <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                      {skillData.sets && (
                        <span style={{ fontSize:9, padding:"2px 7px", borderRadius:4, fontWeight:600,
                          background:T.blueFaint, border:`1px solid ${T.borderBlue}`, color:T.blue }}>
                          Sets {skillData.sets}
                        </span>
                      )}
                      {skillData.useReps && skillData.reps ? (
                        <span style={{ fontSize:9, padding:"2px 7px", borderRadius:4, fontWeight:600,
                          background:T.goldFaint, border:`1px solid ${T.borderGold}`, color:T.gold }}>
                          Reps {skillData.reps} аё„аёЈаёұа№үаёҮ
                        </span>
                      ) : null}
                      {!skillData.useReps && skillData.duration ? (
                        <span style={{ fontSize:9, padding:"2px 7px", borderRadius:4, fontWeight:600,
                          background:T.goldFaint, border:`1px solid ${T.borderGold}`, color:T.gold }}>
                          {skillData.duration >= 60
                            ? `${Math.floor(skillData.duration/60)}m ${skillData.duration%60}s`
                            : `${skillData.duration}s`}
                        </span>
                      ) : null}
                      {skillData.weight > 0 && (
                        <span style={{ fontSize:9, padding:"2px 7px", borderRadius:4, fontWeight:600,
                          background:"rgba(155,114,207,0.08)", border:"1px solid rgba(155,114,207,0.25)", color:"#9B72CF" }}>
                          +{skillData.weight} kg
                        </span>
                      )}
                      {skillData.bodyWeight && !skillData.weight && (
                        <span style={{ fontSize:9, padding:"2px 7px", borderRadius:4, fontWeight:600,
                          background:T.faint, border:`1px solid ${T.border}`, color:T.muted }}>
                          BW
                        </span>
                      )}
                    </div>
                    {/* Photo thumbnails */}
                    {skillData.photos?.length > 0 && (
                      <div style={{ display:"flex", gap:4, marginTop:5 }}>
                        {skillData.photos.slice(0,4).map((p,i) => (
                          <img key={i} src={p} alt="" style={{ width:32, height:32, objectFit:"cover",
                            borderRadius:5, border:`1px solid ${T.border}` }}/>
                        ))}
                        {skillData.photos.length > 4 && (
                          <div style={{ width:32, height:32, borderRadius:5, background:T.faint,
                            border:`1px solid ${T.border}`, display:"flex", alignItems:"center",
                            justifyContent:"center", fontSize:8, color:T.muted, fontWeight:700 }}>
                            +{skillData.photos.length-4}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                ) : scored ? null : (
                  <div style={{ marginTop:2, padding:"5px 10px", borderRadius:6,
                    background:T.faint, border:`1px solid ${T.border}` }}>
                    <span style={{ fontSize:9, color:T.muted }}>
                      аёўаёұаёҮа№„аёЎа№ҲаёЎаёөаёӣаёЈаё°аё§аёұаё•аёҙаёҒаёІаёЈаёқаё¶аёҒ вҖ” аёЈаёӯ Coach а№ғаё«а№үаё„аё°а№Ғаёҷаёҷ
                    </span>
                  </div>
                )}
              </div>
            )}
          </div>

          {/* Right control */}
          {coachMode && unlocked
            ? <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:2 }}>
                <button onClick={()=>setOpen(o=>!o)} style={{
                  background:open?T.goldFaint:T.surface, border:`1px solid ${open?T.borderGold:T.border}`,
                  borderRadius:6, padding:"4px 9px", cursor:"pointer", fontSize:10,
                  color:open?T.gold:score>0?T.sub:T.muted, fontWeight:700, whiteSpace:"nowrap",
                  boxShadow:"0 1px 4px rgba(0,0,0,0.06)" }}>
                  {score>0 ? `${score}/10` : "вҖ”"} {open?"в–І":"в–ј"}
                </button>
                {(()=>{
                  const ps = getEffectiveScore(prevSkillData);
                  return ps > 0 ? (
                    <div style={{ fontSize:7, color:"#9B72CF", fontWeight:600, opacity:0.8 }}>
                      prev {ps}/10
                    </div>
                  ) : null;
                })()}
              </div>
            : unlocked
              ? <div style={{ fontSize:13, fontWeight:700, color:passed?accentColor:scored?T.sub:T.lockedTxt }}>
                  {scored?`${score}/10`:"вҖ”"}
                </div>
              : <div style={{ fontSize:11, color:T.lockedTxt }}>в–Ә</div>
          }
        </div>
      </div>

      {/* в”Җв”Җ Expandable coach panel в”Җв”Җ */}
      {coachMode && unlocked && open && (
        <div style={{ margin:"0 12px 12px", padding:14, borderRadius:8,
                      background:T.bg, border:`1px solid ${T.borderGold}` }}>

          {/* Previous session summary banner */}
          {(()=>{
            const pd = typeof prevSkillData === "object" && prevSkillData ? prevSkillData : {};
            const hasPrev = pd.sets || pd.reps || pd.duration || pd.score;
            if (!hasPrev) return null;
            return (
              <div style={{ marginBottom:12, padding:"8px 10px", borderRadius:7,
                background:"rgba(155,114,207,0.06)", border:"1px solid rgba(155,114,207,0.18)" }}>
                <div style={{ fontSize:7, color:"#9B72CF", letterSpacing:"0.12em", fontWeight:700, marginBottom:4 }}>
                  в–Ј аё„аёЈаёұа№үаёҮаёҒа№Ҳаёӯаёҷ
                </div>
                <div style={{ display:"flex", gap:8, flexWrap:"wrap", fontSize:10, color:"#8B62BF", fontWeight:600 }}>
                  {pd.sets && <span>Sets: {pd.sets}</span>}
                  {pd.useReps && pd.reps ? <span>Reps: {pd.reps}</span> : null}
                  {!pd.useReps && pd.duration ? <span>Duration: {pd.duration}s{pd.duration>=60?` (${Math.floor(pd.duration/60)}m${pd.duration%60}s)`:""}</span> : null}
                  {pd.weight>0 && <span>Weight: {pd.weight}kg</span>}
                  {pd.score>0 && <span>Score: {pd.score}/10</span>}
                </div>
              </div>
            );
          })()}

          {/* SETS */}
          <div style={{ marginBottom:12 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
              <div style={{ fontSize:8, color:T.muted, letterSpacing:"0.10em", fontWeight:700 }}>SETS</div>
              {(()=>{
                const pd = typeof prevSkillData === "object" && prevSkillData ? prevSkillData : {};
                return pd.sets ? <div style={{ fontSize:8, fontWeight:600, color:"#9B72CF" }}>аё„аёЈаёұа№үаёҮаёҒа№Ҳаёӯаёҷ: {pd.sets}</div> : null;
              })()}
            </div>
            <Stepper value={draft.sets} onChange={v=>setDraft(d=>({...d,sets:Math.max(1,v)}))} min={1} max={20}/>
          </div>

          {/* MODE */}
          <div style={{ marginBottom:12 }}>
            <div style={{ fontSize:8, color:T.muted, letterSpacing:"0.10em", marginBottom:6, fontWeight:700 }}>MODE</div>
            <div style={{ display:"flex", gap:6 }}>
              {[{v:true,label:"Reps  аё„аёЈаёұа№үаёҮ"},{v:false,label:"Duration  аё§аёҙ"}].map(m=>(
                <button key={String(m.v)} onClick={()=>setDraft(d=>({...d,useReps:m.v}))} style={{
                  flex:1, padding:"6px 0", borderRadius:6, cursor:"pointer", fontSize:10, fontWeight:600,
                  background:draft.useReps===m.v?T.goldFaint:T.surface,
                  border:`1px solid ${draft.useReps===m.v?T.borderGold:T.border}`,
                  color:draft.useReps===m.v?T.gold:T.muted }}>
                  {m.label}
                </button>
              ))}
            </div>
          </div>

          {/* VALUE */}
          <div style={{ marginBottom:12 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
              <div style={{ fontSize:8, color:T.muted, letterSpacing:"0.10em", fontWeight:700 }}>
                {draft.useReps ? "REPS аёӮаёұа№үаёҷаё•а№Ҳаёі (аё„аёЈаёұа№үаёҮ)" : "DURATION аёӮаёұа№үаёҷаё•а№Ҳаёі (аё§аёҙаёҷаёІаё—аёө)"}
              </div>
              {(()=>{
                const pd = typeof prevSkillData === "object" && prevSkillData ? prevSkillData : {};
                const prevVal = draft.useReps ? pd.reps : pd.duration;
                return prevVal ? <div style={{ fontSize:8, fontWeight:600, color:"#9B72CF" }}>аё„аёЈаёұа№үаёҮаёҒа№Ҳаёӯаёҷ: {prevVal}{draft.useReps?" аё„аёЈаёұа№үаёҮ":" аё§аёҙ"}</div> : null;
              })()}
            </div>
            <Stepper
              value={parseInt(draft.useReps ? draft.reps : draft.duration) || 0}
              onChange={v=>setDraft(d=>({...d, [d.useReps?"reps":"duration"]: String(Math.max(0,v))}))}
              min={0} max={draft.useReps?9999:7200}
              suffix={draft.useReps?" аё„аёЈаёұа№үаёҮ":" аё§аёҙ"}/>
            {!draft.useReps && (parseInt(draft.duration)||0) >= 60 && (
              <div style={{ fontSize:8, color:T.gold, fontWeight:600, marginTop:4 }}>
                = {Math.floor((parseInt(draft.duration)||0)/60)} аёҷаёІаё—аёө {(parseInt(draft.duration)||0)%60} аё§аёҙ
              </div>
            )}
            <div style={{ fontSize:8, color:T.muted, marginTop:6, fontStyle:"italic" }}>
              аёӮаёұа№үаёҷаё•а№Ҳаёі вҖ” аё—аёіа№„аё”а№үаёЎаёІаёҒаёҒаё§а№ҲаёІаёҷаёөа№үаёўаёҙа№ҲаёҮаё”аёө в—Ҷ
            </div>
          </div>

          {/* WEIGHT */}
          <div style={{ marginBottom:12 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
              <div style={{ fontSize:8, color:T.muted, letterSpacing:"0.10em", fontWeight:700 }}>WEIGHT</div>
              {(()=>{
                const pd = typeof prevSkillData === "object" && prevSkillData ? prevSkillData : {};
                return pd.weight>0 ? <div style={{ fontSize:8, fontWeight:600, color:"#9B72CF" }}>аё„аёЈаёұа№үаёҮаёҒа№Ҳаёӯаёҷ: {pd.weight} kg</div>
                  : pd.bodyWeight ? <div style={{ fontSize:8, fontWeight:600, color:"#9B72CF" }}>аё„аёЈаёұа№үаёҮаёҒа№Ҳаёӯаёҷ: BW</div> : null;
              })()}
            </div>
            <div style={{ display:"flex", gap:6, marginBottom:draft.bodyWeight?0:8 }}>
              {[{v:true,label:"Body Weight"},{v:false,label:"+ Add Weight"}].map(m=>(
                <button key={String(m.v)} onClick={()=>setDraft(d=>({...d,bodyWeight:m.v}))} style={{
                  flex:1, padding:"6px 0", borderRadius:6, cursor:"pointer", fontSize:10, fontWeight:600,
                  background:draft.bodyWeight===m.v?T.blueFaint:T.surface,
                  border:`1px solid ${draft.bodyWeight===m.v?T.borderBlue:T.border}`,
                  color:draft.bodyWeight===m.v?T.blue:T.muted }}>
                  {m.label}
                </button>
              ))}
            </div>
            {!draft.bodyWeight && (
              <Stepper value={draft.weight} onChange={v=>setDraft(d=>({...d,weight:Math.max(0,v)}))}
                min={0} max={100} step={0.5} suffix=" kg"/>
            )}
          </div>

          {/* FORM QUALITY */}
          <div style={{ marginBottom:14 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
              <div style={{ fontSize:8, color:T.muted, letterSpacing:"0.10em", fontWeight:700 }}>
                FORM QUALITY  (1вҖ“10)
              </div>
              {(()=>{
                const ps = getEffectiveScore(prevSkillData);
                return ps > 0 ? (
                  <div style={{ fontSize:8, fontWeight:700, padding:"2px 7px", borderRadius:4,
                    background:"rgba(155,114,207,0.10)", border:"1px solid rgba(155,114,207,0.25)",
                    color:"#9B72CF" }}>
                    аё„аёЈаёұа№үаёҮаёҒа№Ҳаёӯаёҷ: {ps}/10
                  </div>
                ) : null;
              })()}
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <Stepper value={draft.score} onChange={v=>setDraft(d=>({...d,score:Math.max(0,Math.min(10,v))}))}
                min={0} max={10}/>
              <div style={{ flex:1 }}>
                {/* Progress bar with previous score marker */}
                <div style={{ position:"relative", height:5, background:T.locked, borderRadius:3, overflow:"visible", marginBottom:3 }}>
                  <div style={{ width:`${draft.score*10}%`, height:"100%", borderRadius:3, transition:"width 0.3s",
                    background:draft.score>=8?T.gold:draft.score>=6?T.green:draft.score>=3?T.blue:T.silver }}/>
                  {(()=>{
                    const ps = getEffectiveScore(prevSkillData);
                    return ps > 0 ? (
                      <div style={{ position:"absolute", top:-2, left:`${ps*10}%`, transform:"translateX(-50%)",
                        width:3, height:9, borderRadius:1, background:"#9B72CF", opacity:0.6 }}
                        title={`аё„аёЈаёұа№үаёҮаёҒа№Ҳаёӯаёҷ: ${ps}/10`}/>
                    ) : null;
                  })()}
                </div>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <div style={{ fontSize:9, fontWeight:600,
                    color:draft.score>=6?T.gold:draft.score>=3?T.blue:T.muted }}>
                    {SCORE_LABELS[draft.score] || ""}
                  </div>
                  {(()=>{
                    const ps = getEffectiveScore(prevSkillData);
                    if (!ps || ps === draft.score) return null;
                    const diff = draft.score - ps;
                    return (
                      <div style={{ fontSize:8, fontWeight:700,
                        color:diff>0?"#22a55e":diff<0?"#DC3545":T.muted }}>
                        {diff>0?`в–І+${diff}`:diff<0?`в–ј${diff}`:""}
                      </div>
                    );
                  })()}
                </div>
              </div>
            </div>
          </div>

          {/* Last tested / decay info */}
          {skillData?.lastTested && (
            <div style={{ fontSize:9, padding:"6px 10px", borderRadius:5, marginBottom:10,
              background: decay?.status==="fading" ? "rgba(220,53,69,0.07)" : T.faint,
              color: decay?.status==="fading" ? "#DC3545" : T.muted,
              border: `1px solid ${decay?.badge ? decayBorder : T.border}` }}>
              {decay?.badge ? decay.badge+" " : ""}
              Last tested: {daysSince(skillData.lastTested)} аё§аёұаёҷаё—аёөа№Ҳа№ҒаёҘа№үаё§
              {decay?.status==="fading" && ` В· аё„аё°а№ҒаёҷаёҷаёҘаё”а№ҒаёҘа№үаё§ ${decay.monthsDecay} аёҲаёёаё”`}
              {decay?.status==="check" && ` В· а№Җаё«аёҘаё·аёӯаёӯаёөаёҒ ${decay.daysLeft} аё§аёұаёҷаёҒа№Ҳаёӯаёҷаё„аё°а№ҒаёҷаёҷаёҘаё”`}
            </div>
          )}

          {/* PHOTO EVIDENCE */}
          <div style={{ marginBottom:12 }}>
            <div style={{ fontSize:8, color:T.muted, letterSpacing:"0.10em", marginBottom:8, fontWeight:700 }}>
              в–«  PHOTO EVIDENCE
            </div>
            {draft.photos.length > 0 && (
              <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:8 }}>
                {draft.photos.map((photo, i) => (
                  <div key={i} style={{ position:"relative" }}>
                    <img src={photo} alt={`evidence ${i+1}`}
                      style={{ width:64, height:64, objectFit:"cover", borderRadius:7,
                        border:`1.5px solid ${T.borderGold}`, display:"block" }}/>
                    <button
                      onClick={()=>setDraft(d=>({...d,photos:d.photos.filter((_,j)=>j!==i)}))}
                      style={{ position:"absolute", top:-6, right:-6, width:18, height:18,
                        borderRadius:"50%", background:"#DC3545", border:"2px solid #FFF",
                        color:"#FFF", fontSize:9, cursor:"pointer", fontWeight:900,
                        display:"flex", alignItems:"center", justifyContent:"center",
                        padding:0, lineHeight:1 }}>вң•</button>
                  </div>
                ))}
              </div>
            )}
            <label style={{ display:"flex", alignItems:"center", gap:8, padding:"9px 12px",
              background:T.bg, border:`1.5px dashed ${T.borderMd}`, borderRadius:7,
              cursor:"pointer", userSelect:"none" }}>
              <input type="file" accept="image/*" capture="environment" style={{ display:"none" }}
                onChange={e => {
                  const file = e.target.files?.[0];
                  if (!file) return;
                  const reader = new FileReader();
                  reader.onload = ev => setDraft(d=>({...d,photos:[...(d.photos||[]),ev.target.result]}));
                  reader.readAsDataURL(file);
                  e.target.value = "";
                }}/>
              <span style={{ fontSize:11, color:T.muted }}>
                в–«  а№ҒаёҷаёҡаёЈаё№аёӣаё«аёҘаёұаёҒаёҗаёІаёҷ
              </span>
              <span style={{ fontSize:9, color:T.muted, marginLeft:"auto" }}>
                {draft.photos.length > 0 ? `${draft.photos.length} аёЈаё№аёӣ` : "аёҒаёҘа№үаёӯаёҮ / аёӯаёұаёҘаёҡаёұа№үаёЎ"}
              </span>
            </label>
          </div>

          <button onClick={handleApply} style={{
            width:"100%", padding:10, borderRadius:7,
            background:`linear-gradient(135deg,${T.gold} 0%,${T.goldBright} 100%)`,
            border:"none", color:"#FFF", fontWeight:700, fontSize:11, cursor:"pointer",
            letterSpacing:"0.08em", boxShadow:"0 2px 8px rgba(184,126,106,0.30)" }}>
            вңҰ  Apply &amp; Reset Timer
          </button>
        </div>
      )}
    </div>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   ADD SKILL FORM (inline in group card)
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function AddSkillForm({ onAdd, onCancel }) {
  const [name, setName] = useState("");
  const [thai, setThai] = useState("");
  const [desc, setDesc] = useState("");
  const canSave = name.trim().length > 0;
  const inp = { width:"100%", padding:"8px 10px", borderRadius:7,
    border:`1.5px solid ${T.border}`, background:T.bg2, color:T.text,
    fontSize:11, outline:"none", boxSizing:"border-box" };
  return (
    <div style={{ padding:"12px 16px", background:T.surface, borderTop:`1px solid ${T.divider}` }}>
      <div style={{ fontSize:10, fontWeight:700, color:T.sub, letterSpacing:"0.08em", marginBottom:8 }}>
        вһ• ADD CUSTOM SKILL
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:7 }}>
        <input placeholder="Skill name *" value={name} onChange={e=>setName(e.target.value)} style={inp}/>
        <input placeholder="аёҠаё·а№Ҳаёӯаё аёІаё©аёІа№„аё—аёў" value={thai} onChange={e=>setThai(e.target.value)} style={inp}/>
        <input placeholder="Description / note" value={desc} onChange={e=>setDesc(e.target.value)} style={inp}/>
        <div style={{ display:"flex", gap:8 }}>
          <button disabled={!canSave}
            onClick={()=>{ if(!canSave) return;
              onAdd({ id:`csk_${Date.now().toString(36)}`, name:name.trim(), thai:thai.trim(), desc:desc.trim() }); }}
            style={{ flex:1, padding:"9px 0", borderRadius:8, border:"none",
              cursor:canSave?"pointer":"default",
              background:canSave?"#22a55e":"rgba(0,0,0,0.12)",
              color:canSave?"#fff":T.muted,
              fontSize:11, fontWeight:700, letterSpacing:"0.08em" }}>SAVE</button>
          <button onClick={onCancel}
            style={{ flex:1, padding:"9px 0", borderRadius:8,
              border:`1px solid ${T.border}`, background:"transparent", color:T.muted,
              fontSize:11, fontWeight:700, cursor:"pointer", letterSpacing:"0.08em" }}>CANCEL</button>
        </div>
      </div>
    </div>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   BASIC GROUP CARD
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function BasicGroupCard({ group, scores, coachMode, onScore, isOpen, onToggle,
                          editMode, customGroupSkills=[], onAddSkill, onDeleteSkill, headCoachMode, prevScores={} }) {
  const [showAddForm, setShowAddForm] = useState(false);
  const allSkills = [...group.skills, ...customGroupSkills];
  const passCount = allSkills.filter(s=>getEffectiveScore(scores[s.id])>=group.passScore).length;
  const total = allSkills.length, allPassed = total > 0 && passCount === total;
  const completionPct = total === 0 ? 0 : Math.round((passCount/total)*100);

  return (
    <div style={{ background:T.surface, border:`1px solid ${allPassed?group.borderColor:T.border}`,
                  borderRadius:10, overflow:"hidden", marginBottom:10,
                  boxShadow:allPassed?`0 2px 12px ${group.faintColor}`:T.cardShadow }}>
      <div onClick={onToggle} style={{ padding:"13px 16px", display:"flex", alignItems:"center", gap:12,
                                       cursor:"pointer", background:isOpen?T.surfaceHi:T.surface, userSelect:"none" }}>
        <div style={{ width:40, height:40, flexShrink:0, borderRadius:8, fontSize:18,
          background:allPassed?group.faintColor:T.faint,
          border:`1.5px solid ${allPassed?group.color:T.borderMd}`,
          display:"flex", alignItems:"center", justifyContent:"center",
          boxShadow:allPassed?`0 0 12px ${group.color}30`:"none" }}>{group.icon}</div>
        <div style={{ flex:1 }}>
          <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:4 }}>
            <span style={{ fontSize:12, fontWeight:700, letterSpacing:"0.05em", color:T.text }}>{group.name}</span>
            {allPassed&&<span style={{ fontSize:8, padding:"2px 7px", borderRadius:10,
              background:group.faintColor, color:group.color, border:`1px solid ${group.borderColor}`, fontWeight:700 }}>PASSED</span>}
          </div>

          {/* Progress bar + percentage */}
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <div style={{ flex:1, height:3, background:T.locked, borderRadius:2, overflow:"hidden" }}>
              <div style={{ width:`${completionPct}%`, height:"100%",
                background:allPassed?group.color:T.silver, transition:"width 0.5s" }}/>
            </div>
            <span style={{ fontSize:9, fontWeight:700, color:allPassed?group.color:T.sub, whiteSpace:"nowrap" }}>
              {passCount}/{total} ({completionPct}%)
            </span>
          </div>

          <div style={{ fontSize:9, color:T.muted, marginTop:3 }}>{group.thai}</div>
        </div>
        <div style={{ color:T.muted, fontSize:11, flexShrink:0 }}>{isOpen?"в–І":"в–ј"}</div>
      </div>

      {isOpen&&(
        <div>
          <div style={{ padding:"8px 16px", fontSize:10, color:T.muted,
            background:T.faint, borderBottom:`1px solid ${T.divider}`, lineHeight:1.6 }}>{group.note}</div>
          {group.skills.map(skill=>(
            <SkillRow key={skill.id} skill={skill} skillData={scores[skill.id]}
              unlocked coachMode={coachMode} onScore={onScore}
              passScore={group.passScore} accentColor={group.color}
              prevSkillData={(prevScores||{})[skill.id]}/>
          ))}
          {customGroupSkills.map(skill=>(
            <div key={skill.id} style={{ position:"relative" }}>
              <SkillRow skill={skill} skillData={scores[skill.id]}
                unlocked coachMode={coachMode} onScore={onScore}
                passScore={group.passScore} accentColor={group.color}
                prevSkillData={(prevScores||{})[skill.id]}/>
              <span style={{ position:"absolute", top:8, left:54, fontSize:8, padding:"1px 5px",
                borderRadius:8, background:"rgba(34,165,94,0.15)", color:"#22a55e",
                fontWeight:700, pointerEvents:"none" }}>Custom</span>
              {headCoachMode&&(
                <button onClick={e=>{ e.stopPropagation(); onDeleteSkill&&onDeleteSkill(skill.id); }}
                  style={{ position:"absolute", top:10, right:12, width:22, height:22,
                    borderRadius:"50%", border:"none", background:"rgba(220,50,50,0.15)",
                    color:"#e05555", fontSize:12, cursor:"pointer", display:"flex",
                    alignItems:"center", justifyContent:"center" }}>вң•</button>
              )}
            </div>
          ))}
          {editMode&&!showAddForm&&(
            <div style={{ padding:"10px 16px" }}>
              <button onClick={e=>{ e.stopPropagation(); setShowAddForm(true); }}
                style={{ width:"100%", padding:"9px 0", borderRadius:8,
                  border:`1.5px dashed ${group.color}`, background:group.faintColor,
                  color:group.color, fontSize:11, fontWeight:700, cursor:"pointer",
                  letterSpacing:"0.08em" }}>+ Add Skill</button>
            </div>
          )}
          {editMode&&showAddForm&&(
            <AddSkillForm
              onAdd={skill=>{ onAddSkill&&onAddSkill(skill); setShowAddForm(false); }}
              onCancel={()=>setShowAddForm(false)}/>
          )}
          <div style={{ padding:"9px 16px", fontSize:10, textAlign:"center",
            color:allPassed?group.color:T.muted, background:allPassed?group.faintColor:"transparent" }}>
            {allPassed?"аёңа№ҲаёІаёҷаёҒаёҘаёёа№ҲаёЎаёҷаёөа№үаё„аёЈаёҡаё—аёёаёҒ skill а№ҒаёҘа№үаё§":`аё•а№үаёӯаёҮа№„аё”а№ү вүҘ ${group.passScore}/10 аё—аёёаёҒ skill а№Җаёһаё·а№Ҳаёӯаёңа№ҲаёІаёҷ`}
          </div>
        </div>
      )}
    </div>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   HS LEVEL CARD
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function HSLevelCard({ level, scores, unlockedLevels, clearedLevels, coachMode, onScore, isOpen, onToggle,
                       editMode, customLevelSkills=[], onAddSkill, onDeleteSkill, headCoachMode,
                       accentColor=T.gold, accentFaint=T.goldFaint, accentGlow=T.goldGlow, accentBorder=T.borderGold, prevScores={} }) {
  const [showAddForm, setShowAddForm] = useState(false);
  const isUnlocked = unlockedLevels.has(level.id), isCleared = clearedLevels.has(level.id);
  const allSkills = [...level.skills, ...customLevelSkills];
  const passCount = allSkills.filter(s=>getEffectiveScore(scores[s.id])>=level.passScore).length;
  const total = allSkills.length;
  const completionPct = total === 0 ? 0 : Math.round((passCount/total)*100);

  return (
    <div style={{ background:T.surface,
      border:`1px solid ${isCleared?accentBorder:T.border}`, borderRadius:10, overflow:"hidden", marginBottom:10,
      boxShadow:isCleared?`0 2px 12px ${accentFaint}`:T.cardShadow }}>
      {/* в”Җв”Җ Level Header в”Җв”Җ */}
      <div onClick={onToggle} style={{ padding:"13px 16px", display:"flex", alignItems:"center", gap:12,
                                       cursor:"pointer", background:isOpen?T.surfaceHi:T.surface, userSelect:"none" }}>
        <div style={{ width:40, height:40, flexShrink:0, borderRadius:8,
          background:isCleared?accentFaint:isUnlocked?T.faint:T.locked,
          border:`1.5px solid ${isCleared?accentColor:isUnlocked?T.borderMd:T.border}`,
          display:"flex", alignItems:"center", justifyContent:"center",
          fontSize:11, fontWeight:900, letterSpacing:"0.04em",
          color:isCleared?accentColor:isUnlocked?T.sub:T.lockedTxt,
          boxShadow:isCleared?`0 0 12px ${accentGlow}`:"none" }}>{level.icon}</div>
        <div style={{ flex:1 }}>
          <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:4 }}>
            <span style={{ fontSize:12, fontWeight:700, letterSpacing:"0.05em", color:isUnlocked?T.text:T.lockedTxt }}>
              {level.name}
            </span>
            {isCleared&&<span style={{ fontSize:8, padding:"2px 7px", borderRadius:10, fontWeight:700,
              background:accentFaint, color:accentColor, border:`1px solid ${accentBorder}` }}>PASSED</span>}
            {!isUnlocked&&<span style={{ fontSize:8, color:T.lockedTxt }}>LOCKED</span>}
          </div>

          {/* Progress bar + percentage */}
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <div style={{ flex:1, height:3, background:T.locked, borderRadius:2, overflow:"hidden" }}>
              <div style={{ width:`${completionPct}%`, height:"100%",
                background:isCleared?accentColor:T.silver, transition:"width 0.5s" }}/>
            </div>
            <span style={{ fontSize:9, fontWeight:700, color:isCleared?accentColor:T.sub, whiteSpace:"nowrap" }}>
              {passCount}/{total} ({completionPct}%)
            </span>
          </div>

          <div style={{ fontSize:9, color:T.muted, marginTop:3 }}>{level.thai}</div>
        </div>
        <div style={{ color:T.muted, fontSize:11, flexShrink:0 }}>{isOpen?"в–І":"в–ј"}</div>
      </div>

      {isOpen&&(
        <div>
          <div style={{ padding:"8px 16px", fontSize:10, color:T.muted,
            background:T.faint, borderBottom:`1px solid ${T.divider}`, lineHeight:1.6 }}>{level.note}</div>
          {level.skills.map(skill=>(
            <SkillRow key={skill.id} skill={skill} skillData={scores[skill.id]}
              unlocked={isUnlocked} coachMode={coachMode} onScore={onScore}
              passScore={level.passScore} accentColor={accentColor}
              prevSkillData={(prevScores||{})[skill.id]}/>
          ))}
          {customLevelSkills.map(skill=>(
            <div key={skill.id} style={{ position:"relative" }}>
              <SkillRow skill={skill} skillData={scores[skill.id]}
                unlocked={isUnlocked} coachMode={coachMode} onScore={onScore}
                passScore={level.passScore} accentColor={accentColor}
                prevSkillData={(prevScores||{})[skill.id]}/>
              <span style={{ position:"absolute", top:8, left:54, fontSize:8, padding:"1px 5px",
                borderRadius:8, background:"rgba(34,165,94,0.15)", color:"#22a55e",
                fontWeight:700, pointerEvents:"none" }}>Custom</span>
              {headCoachMode&&(
                <button onClick={e=>{ e.stopPropagation(); onDeleteSkill&&onDeleteSkill(skill.id); }}
                  style={{ position:"absolute", top:10, right:12, width:22, height:22,
                    borderRadius:"50%", border:"none", background:"rgba(220,50,50,0.15)",
                    color:"#e05555", fontSize:12, cursor:"pointer", display:"flex",
                    alignItems:"center", justifyContent:"center" }}>вң•</button>
              )}
            </div>
          ))}
          {editMode&&!showAddForm&&(
            <div style={{ padding:"10px 16px" }}>
              <button onClick={e=>{ e.stopPropagation(); setShowAddForm(true); }}
                style={{ width:"100%", padding:"9px 0", borderRadius:8,
                  border:`1.5px dashed ${accentColor}`, background:accentFaint,
                  color:accentColor, fontSize:11, fontWeight:700, cursor:"pointer",
                  letterSpacing:"0.08em" }}>+ Add Skill</button>
            </div>
          )}
          {editMode&&showAddForm&&(
            <AddSkillForm
              onAdd={skill=>{ onAddSkill&&onAddSkill(skill); setShowAddForm(false); }}
              onCancel={()=>setShowAddForm(false)}/>
          )}
          <div style={{ padding:"9px 16px", fontSize:10, textAlign:"center",
            color:isCleared?accentColor:T.muted, background:isCleared?accentFaint:"transparent" }}>
            {isCleared?`аёңа№ҲаёІаёҷаёЈаё°аё”аёұаёҡаёҷаёөа№үа№ҒаёҘа№үаё§ вҖ” Level ${level.id+1} аёӣаёҘаё”аёҘа№Үаёӯаё„`
              :isUnlocked?`Coach аё•а№үаёӯаёҮа№ғаё«а№ү вүҘ ${level.passScore}/10 аё—аёёаёҒ skill а№Җаёһаё·а№ҲаёӯаёӣаёҘаё”аёҘа№Үаёӯаё„ Level аё–аёұаё”а№„аёӣ`
              :`аё•а№үаёӯаёҮаёңа№ҲаёІаёҷ Level ${level.id-1} аёҒа№Ҳаёӯаёҷ`}
          </div>
        </div>
      )}
    </div>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ

function LoginScreen({ onLoginSuccess, onShowSetup }) {
  const lang = useLang();
  const [step, setStep] = useState('role'); // role вҶ’ credentials
  const [selectedRole, setSelectedRole] = useState(null);
  const [username, setUsername] = useState('');
  const [pin, setPin] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleLogin = useCallback(() => {
    if (!username || !pin) {
      setError(lang === 'th' ? 'аёҒаёЈаёёаё“аёІаёҒаёЈаёӯаёҒаёҠаё·а№Ҳаёӯаёңаё№а№үа№ғаёҠа№үа№ҒаёҘаё° PIN' : 'Please enter username and PIN');
      return;
    }

    setLoading(true);
    setTimeout(() => {
      const user = verifyCredentials(username, pin);
      if (user) {
        setAuthSession(user, user.role);
        onLoginSuccess(user, user.role);
      } else {
        setError(L('auth.invalidCredentials')[lang]);
      }
      setLoading(false);
    }, 300);
  }, [username, pin, lang, onLoginSuccess]);

  const roleCards = [
    { id:'owner', label: L('auth.owner')[lang], emoji:'рҹ‘‘', desc: 'Full system access' },
    { id:'head_coach', label: L('auth.headCoach')[lang], emoji:'рҹҺҜ', desc: 'All students' },
    { id:'coach', label: L('auth.coach')[lang], emoji:'рҹ’Ә', desc: 'Assigned students' },
    { id:'student', label: L('auth.student')[lang], emoji:'рҹҢҹ', desc: 'Your progress' },
  ];

  if (step === 'role') {

      <div style={{
        minHeight:'100vh', background:T.bg, display:'flex', flexDirection:'column',

      }}>

          <div style={{ fontSize:32, marginBottom:10 }}>в—Ҳ</div>
          <div style={{ fontSize:20, fontWeight:900, letterSpacing:'0.12em', marginBottom:6 }}>
            MOVENTIA
          </div>
          <div style={{ fontSize:11, color:T.sub, letterSpacing:'0.08em' }}>
            {L('auth.selectRole')[lang]}
          </div>
        </div>

        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, width:'100%', maxWidth:400 }}>
          {roleCards.map(r => (
            <button
              key={r.id}
              onClick={() => { setSelectedRole(r.id); setStep('credentials'); }}
              style={{
                padding:'20px 16px', borderRadius:12, border:`1px solid ${T.border}`,
                background:T.surface, cursor:'pointer', color:T.text, textAlign:'center',
                transition:'all 0.2s', transform:'scale(1)',
                ':hover': { transform:'scale(1.02)' }
              }}
              onMouseEnter={e => e.target.style.borderColor = T.gold}
              onMouseLeave={e => e.target.style.borderColor = T.border}
            >
              <div style={{ fontSize:28, marginBottom:8 }}>{r.emoji}</div>
              <div style={{ fontSize:12, fontWeight:700, marginBottom:4 }}>{r.label}</div>
              <div style={{ fontSize:9, color:T.sub }}>{r.desc}</div>
            </button>
          ))}
        </div>

        <button
          onClick={onShowSetup}
          style={{
            marginTop:30, padding:'10px 16px', borderRadius:8,
            border:`1px solid ${T.borderGold}`, background:'transparent',
            color:T.gold, fontSize:10, fontWeight:700, cursor:'pointer',
            letterSpacing:'0.06em'
          }}
        >
          в—Ҳ {L('auth.setupAccount')[lang]}
        </button>
      </div>
    );
  }

  // Credentials step
  return (
    <div style={{
      minHeight:'100vh', background:T.bg, display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center', padding:'20px'
    }}>
      <div style={{ width:'100%', maxWidth:340 }}>
        <button
          onClick={() => { setStep('role'); setError(''); setUsername(''); setPin(''); }}
          style={{ background:'none', border:'none', color:T.gold, fontSize:10,
            fontWeight:700, cursor:'pointer', marginBottom:20, letterSpacing:'0.08em' }}
        >
          вҶҗ {L('auth.selectRole')[lang]}
        </button>

        <div style={{ textAlign:'center', marginBottom:30 }}>
          <div style={{ fontSize:24, marginBottom:8 }}>рҹ”җ</div>
          <div style={{ fontSize:16, fontWeight:700, marginBottom:4 }}>
            {L('auth.loginTitle')[lang]}
          </div>
        </div>

        <div style={{ marginBottom:16 }}>
          <label style={{ display:'block', fontSize:10, fontWeight:700, marginBottom:6,
            color:T.sub, letterSpacing:'0.06em' }}>
            {L('auth.username')[lang]}
          </label>
          <input
            type="text"
            value={username}
            onChange={e => { setUsername(e.target.value); setError(''); }}
            placeholder="Enter username"
            style={{
              width:'100%', padding:'10px 12px', borderRadius:8,
              border:`1px solid ${T.border}`, background:T.surface,
              color:T.text, fontSize:13, fontFamily:'inherit',
              outline:'none',
            }}
          />
        </div>

        <div style={{ marginBottom:20 }}>
          <label style={{ display:'block', fontSize:10, fontWeight:700, marginBottom:6,

          </label>
          <input

            value={pin}

        >
          {loading ? 'вҸі' : 'в—Ҳ'} {L('auth.login')[lang]}
        </button>
      </div>
    </div>
  );
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   USER MANAGEMENT вҖ” Create/edit/suspend users (Owner+Head Coach)
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function UserManagement({ currentRole, onClose }) {
  const lang = useLang();
  const [users, setUsers] = useState(getUsers());
  const [showCreate, setShowCreate] = useState(false);
  const [newRole, setNewRole] = useState('coach');
  const [newName, setNewName] = useState('');
  const [newUsername, setNewUsername] = useState('');
  const [newPin, setNewPin] = useState('');

  const handleCreateUser = useCallback(() => {
    if (!newName || !newUsername || newPin.length !== 4) return;
    const user = createUser(newUsername, newPin, newRole, newName);
    setUsers([...users, user]);
    setShowCreate(false);
    setNewName('');
    setNewUsername('');
    setNewPin('');
  }, [users, newRole, newName, newUsername, newPin]);

  const handleSuspend = useCallback((userId) => {
    suspendUser(userId);
    setUsers(users.map(u => u.id === userId ? { ...u, suspended: true } : u));
  }, [users]);

  return (
    <div style={{ padding:'16px' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
        <div style={{ fontSize:13, fontWeight:700, color:T.gold }}>рҹ‘Ҙ Users</div>
        <button onClick={onClose} style={{
          background:'none', border:'none', color:T.sub, cursor:'pointer', fontSize:16
        }}>вң•</button>
      </div>

      <div style={{ marginBottom:16, maxHeight:'400px', overflowY:'auto' }}>
        {users.map(u => (
          <div key={u.id} style={{
            padding:'12px', marginBottom:8, borderRadius:8,
            border:`1px solid ${T.border}`, background:T.surface
          }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'start' }}>
              <div>
                <div style={{ fontSize:12, fontWeight:700, color:T.text }}>{u.name}</div>
                <div style={{ fontSize:10, color:T.sub }}>{u.username} вҖў {u.role}</div>
              </div>
              {!u.suspended && currentRole === 'owner' && (
                <button
                  onClick={() => handleSuspend(u.id)}
                  style={{
                    padding:'4px 8px', fontSize:9, borderRadius:5,
                    border:`1px solid ${T.borderCrimson}`, background:'transparent',
                    color:T.crimson, cursor:'pointer', fontWeight:600
                  }}
                >
                  Suspend
                </button>
              )}
            </div>
          </div>
        ))}
      </div>

      {!showCreate ? (
        <button
          onClick={() => setShowCreate(true)}
          style={{
            width:'100%', padding:'10px', borderRadius:8,
            border:`1px solid ${T.borderGold}`, background:'transparent',
            color:T.gold, fontSize:11, fontWeight:700, cursor:'pointer'
          }}
        >
          + Create User
        </button>
      ) : (
        <div style={{ padding:'12px', borderRadius:8, background:T.surface, border:`1px solid ${T.borderGold}` }}>
          <input
            type="text"
            placeholder="Name"
            value={newName}
            onChange={e => setNewName(e.target.value)}
            style={{
              width:'100%', padding:'8px', marginBottom:8, borderRadius:6,
              border:`1px solid ${T.border}`, background:T.bg, color:T.text,
              fontSize:11, fontFamily:'inherit', outline:'none'
            }}
          />
          <input
            type="text"
            placeholder="Username"
            value={newUsername}
            onChange={e => setNewUsername(e.target.value)}
            style={{
              width:'100%', padding:'8px', marginBottom:8, borderRadius:6,
              border:`1px solid ${T.border}`, background:T.bg, color:T.text,
              fontSize:11, fontFamily:'inherit', outline:'none'
            }}
          />
          <input
            type="password"
            maxLength="4"
            placeholder="PIN"
            value={newPin}
            onChange={e => setNewPin(e.target.value.replace(/\D/g, ''))}
            style={{
              width:'100%', padding:'8px', marginBottom:8, borderRadius:6,
              border:`1px solid ${T.border}`, background:T.bg, color:T.text,
              fontSize:11, fontFamily:'monospace', letterSpacing:'0.1em', outline:'none'
            }}
          />
          <select
            value={newRole}
            onChange={e => setNewRole(e.target.value)}
            style={{
              width:'100%', padding:'8px', marginBottom:8, borderRadius:6,
              border:`1px solid ${T.border}`, background:T.bg, color:T.text,
              fontSize:11, fontFamily:'inherit', outline:'none'
            }}
          >
            <option value="coach">Coach</option>
            <option value="head_coach">Head Coach</option>
            <option value="student">Student</option>
          </select>
          <button
            onClick={handleCreateUser}
            disabled={!newName || !newUsername || newPin.length !== 4}
            style={{
              width:'100%', padding:'8px', borderRadius:6,
              background:T.gold, color:T.bg, border:'none',
              fontSize:10, fontWeight:700, cursor:'pointer', opacity: newName && newUsername && newPin.length === 4 ? 1 : 0.5
            }}
          >
            Create
          </button>
        </div>
      )}
    </div>
  );
}

function HomeTab({ scores, sessions, students, selectedStudent, onSelectStudent }) {
  // Use global selectedStudent (synced across tabs)
  const viewStudent = selectedStudent || "";
  const viewScores = viewStudent ? getStudentPrevScores(sessions, viewStudent) : scores;
  const viewSessions = viewStudent
    ? sessions.filter(s => s.type === "personal" && (s.playerName || "").trim().toLowerCase() === viewStudent.trim().toLowerCase())
    : sessions;

  const fs      = calcFitnessStats(viewScores);
  const unlocked = calcUnlockedHS(viewScores);
  const cleared  = calcClearedHS(viewScores);
  const asUnlocked = calcUnlockedAS(viewScores);
  const asCleared  = calcClearedAS(viewScores);
  const title    = getTitle(viewScores);
  const mastery  = calcMastery(viewScores);
  const passed   = calcPassedSkills(viewScores);
  const basicP   = calcBasicPassed(viewScores);
  const curLvId  = Math.max(...Array.from(unlocked));
  const curLv    = HS_LEVELS.find(l=>l.id===curLvId) || HS_LEVELS[0];
  const lvPassCount = curLv.skills.filter(s=>getEffectiveScore(viewScores[s.id])>=curLv.passScore).length;
  const needsRetest = ALL_SKILLS.filter(sk => { const d=getDecayInfo(viewScores[sk.id]); return d?.badge; });
  const totalLevels = TRACK_CONFIG.reduce((s,t)=>s+t.levels.length, 0);
  const totalCleared = TRACK_CONFIG.reduce((s,t)=>s+calcClearedTrack(t.levels, viewScores).size, 0);

  // chart data from personal session history only (group sessions have no mastery)
  const chartData = sessions.filter(s => s.type !== "group").slice(-12).map(s => ({
    label: `#${s.id}`,
    mastery: s.mastery,
    passed: s.passedSkills,
  }));

  return (
    <div style={{ padding:16, display:"flex", flexDirection:"column", gap:12 }}>

      {/* Student selector */}
      {students && students.length > 0 && (
        <div style={{ background:T.surface, borderRadius:10, border:`1px solid ${viewStudent?T.borderGold:T.border}`,
                      padding:"10px 14px", boxShadow:T.cardShadow, display:"flex", alignItems:"center", gap:10 }}>
          {(()=>{
            const sel = students.find(s=>s.name===viewStudent);
            return sel?.avatar ? (
              <div style={{ width:30, height:30, borderRadius:"50%", flexShrink:0, overflow:"hidden",
                border:`1.5px solid ${T.borderGold}` }}>
                <img src={sel.avatar} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }}/>
              </div>
            ) : (
              <div style={{ fontSize:9, color:T.muted, fontWeight:700, letterSpacing:"0.10em", whiteSpace:"nowrap" }}>
                в—Ӣ аё”аё№аёӮа№үаёӯаёЎаё№аёҘ
              </div>
            );
          })()}
          <select value={viewStudent} onChange={e=>onSelectStudent(e.target.value)}
            style={{ flex:1, padding:"7px 10px", borderRadius:6, fontSize:11, fontWeight:600,
              border:`1px solid ${T.borderMd}`, background:T.bg, color:T.text,
              outline:"none", cursor:"pointer", appearance:"auto" }}>
            <option value="">вҖ” аёӣаёұаёҲаёҲаёёаёҡаёұаёҷ (Live) вҖ”</option>
            {students.map(s=>(<option key={s.id} value={s.name}>{s.name}</option>))}
          </select>
          {viewStudent && (
            <div style={{ fontSize:8, color:T.gold, fontWeight:600, whiteSpace:"nowrap" }}>
              {viewSessions.length} sessions
            </div>
          )}
        </div>
      )}

      {/* KPI row */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:8 }}>
        <StatCard icon="в–Ј" label="Sessions" value={sessions.filter(s=>s.type!=="group").length} color={T.gold}/>

        <StatCard icon="вң“" label="Skills OK" value={`${passed}/${ALL_SKILLS.length}`} color={T.green}/>
        <StatCard icon="в–І" label="Levels" value={`${totalCleared}/${totalLevels}`} color={T.gold}/>
        <StatCard icon="в—Ҳ" label="Mastery" value={`${mastery}%`} color={T.blue}/>
      </div>

      {/* Title + current level ring */}
      <div style={{ background:T.surface, borderRadius:10, border:`1px solid ${T.borderGold}`,
                    padding:"16px 18px", boxShadow:T.cardShadow }}>
        <div style={{ display:"flex", alignItems:"center", gap:14 }}>
          <Ring value={lvPassCount} max={curLv.skills.length} color={T.gold} size={78} stroke={7}
            label={`Lv ${curLvId}`}/>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:9, color:T.muted, letterSpacing:"0.14em", marginBottom:4, fontWeight:600 }}>
              CURRENT STATUS
            </div>
            <div style={{ fontSize:15, fontWeight:700, color:T.text, marginBottom:3 }}>{title.en}</div>
            <div style={{ fontSize:10, color:T.gold, marginBottom:6 }}>{title.th}</div>
            <div style={{ height:3, background:T.locked, borderRadius:2, overflow:"hidden", marginBottom:4 }}>
              <div style={{ width:`${mastery}%`, height:"100%",
                background:`linear-gradient(90deg,${T.gold}99,${T.gold})`, transition:"width 0.6s" }}/>
            </div>
            <div style={{ fontSize:9, color:T.muted }}>Overall Mastery {mastery}%</div>
          </div>
        </div>
      </div>

      {/* в”Җв”Җ TRAINING RECOMMENDATIONS в”Җв”Җ */}
      {(()=>{
        // Compute recommendations
        const recs = [];

        // 1. Skills needing retest (decay)
        if (needsRetest.length > 0) {
          recs.push({ icon:"в–і", title:`${needsRetest.length} skill а№ғаёҒаёҘа№үаё«аёЎаё”аёӯаёІаёўаёё / аё„аё°а№ҒаёҷаёҷаёҘаё”а№ҒаёҘа№үаё§`,
            desc:`аё„аё§аёЈа№„аёӣаё—аё”аёӘаёӯаёҡаёӢа№үаёіаё—аёөа№Ҳа№Ғаё—а№Үаёҡ COACH а№Җаёһаё·а№ҲаёӯаёЈаёөа№ҖаёӢа№Үаё• Timer`,
            color:"#DC3545", bg:"rgba(220,53,69,0.06)", border:"rgba(220,53,69,0.18)", priority:1 });
        }

        // 2. Current level progress вҖ” incomplete skills
        const curLvRemain = curLv.skills.filter(s=>getEffectiveScore(viewScores[s.id])<curLv.passScore);
        if (curLvRemain.length > 0 && curLvRemain.length <= 5) {
          recs.push({ icon:"в–ё", title:`аёӯаёөаёҒ ${curLvRemain.length} skill аёҲаё°аёңа№ҲаёІаёҷ Handstand Lv ${curLvId}`,
            desc: curLvRemain.map(s=>s.name).join(", "),
            color:T.gold, bg:T.goldFaint, border:T.borderGold, priority:2 });
        }

        // 3. Weakest track вҖ” find track with lowest clearance %
        const trackProgress = TRACK_CONFIG.map(t => {
          const cl = calcClearedTrack(t.levels, viewScores).size;
          return { ...t, cleared:cl, pct: Math.round((cl / t.levels.length) * 100) };
        }).filter(t => t.pct < 100);
        const weakest = trackProgress.sort((a,b)=>a.pct-b.pct)[0];
        if (weakest) {
          // find first uncompleted level in weakest track
          const tUnl = calcUnlockedTrack(weakest.levels, viewScores);
          const tClr = calcClearedTrack(weakest.levels, viewScores);
          const nextLv = weakest.levels.find(l=>tUnl.has(l.id) && !tClr.has(l.id));
          const remain = nextLv ? nextLv.skills.filter(s=>getEffectiveScore(viewScores[s.id])<nextLv.passScore).length : 0;
          recs.push({ icon:weakest.icon, title:`${weakest.label} аёўаёұаёҮаёһаёұаё’аёҷаёІа№„аё”а№үаёӯаёөаёҒ (${weakest.pct}%)`,
            desc: nextLv ? `${nextLv.name} вҖ” а№Җаё«аёҘаё·аёӯаёӯаёөаёҒ ${remain} skill` : `а№ҖаёЈаёҙа№ҲаёЎаёқаё¶аёҒ ${weakest.label} Lv 1`,
            color:weakest.color, bg:weakest.faint, border:weakest.border, priority:3 });
        }

        // 4. Unscored basic skills
        const unscoredBasic = BASIC_GROUPS.reduce((arr,g) => {
          const u = g.skills.filter(s=> !getEffectiveScore(viewScores[s.id]));
          return [...arr, ...u];
        }, []);
        if (unscoredBasic.length > 0) {
          recs.push({ icon:"в—Ҷ", title:`${unscoredBasic.length} Basic Skill аёўаёұаёҮа№„аёЎа№Ҳа№Җаё„аёўаёқаё¶аёҒ`,
            desc: unscoredBasic.slice(0,3).map(s=>s.name).join(", ") + (unscoredBasic.length>3?` +${unscoredBasic.length-3} аёӯаё·а№Ҳаёҷа№Ҷ`:""),
            color:T.blue, bg:T.blueFaint, border:T.borderBlue, priority:4 });
        }

        // 5. If mastery is high, encourage next milestone
        if (mastery >= 70 && mastery < 100) {
          recs.push({ icon:"в—Ҳ", title:`Mastery ${mastery}% вҖ” а№ғаёҒаёҘа№үаёЈаё°аё”аёұаёҡаё–аёұаё”а№„аёӣа№ҒаёҘа№үаё§!`,
            desc:"а№Җаёҷа№үаёҷаёқаё¶аёҒ skill аё—аёөа№ҲаёўаёұаёҮа№„аёЎа№Ҳаёңа№ҲаёІаёҷ а№Җаёһаё·а№Ҳаёӯа№„аёӣа№ғаё«а№үаё–аё¶аёҮ 100%",
            color:T.green, bg:T.greenFaint, border:T.borderGreen, priority:5 });
        }

        if (recs.length === 0) return null;

        return (
          <div style={{ background:T.surface, borderRadius:10, border:`1px solid ${T.border}`,
                        padding:"14px 16px", boxShadow:T.cardShadow }}>
            <div style={{ fontSize:9, color:T.gold, letterSpacing:"0.14em", marginBottom:10, fontWeight:700 }}>
              в–ё  а№Ғаёҷаё°аёҷаёіаёҒаёІаёЈаёқаё¶аёҒаё•а№Ҳаёӯа№„аёӣ
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {recs.sort((a,b)=>a.priority-b.priority).slice(0,4).map((r,i) => (
                <div key={i} style={{ padding:"8px 12px", borderRadius:8,
                  background:r.bg, border:`1px solid ${r.border}` }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <span style={{ fontSize:14 }}>{r.icon}</span>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:10, fontWeight:700, color:r.color }}>{r.title}</div>
                      <div style={{ fontSize:9, color:T.muted, marginTop:1 }}>{r.desc}</div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      {/* Fitness Radar */}
      <div style={{ background:T.surface, borderRadius:10, border:`1px solid ${T.border}`,
                    padding:"16px 18px", boxShadow:T.cardShadow }}>
        <div style={{ fontSize:9, color:T.muted, letterSpacing:"0.14em", marginBottom:12, fontWeight:600 }}>
          FITNESS STATUS
        </div>
        <RadarChart fs={fs} size={180}/>
        <div style={{ marginTop:12 }}>
          {STATS.map(s=><StatBar key={s.id} stat={s} value={fs[s.id]||0}/>)}
        </div>
      </div>

      {/* Track Progressions вҖ” organized by category */}
      {CATEGORIES.filter(cat=>cat.id!=="basic").map(cat=>{
        const catTracks = cat.tracks.map(k=>TRACK_CONFIG.find(t=>t.key===k)).filter(Boolean);
        return (
          <div key={cat.id}>
            <div style={{ fontSize:9, color:cat.color, letterSpacing:"0.14em", marginBottom:8, fontWeight:700 }}>
              {cat.icon} {cat.label}
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:8 }}>
              {catTracks.map(track => {
                const tUnlocked = calcUnlockedTrack(track.levels, viewScores);
                const tCleared  = calcClearedTrack(track.levels, viewScores);
                const trackCleared = tCleared.size;
                const trackTotal = track.levels.length;
                return (
                  <div key={track.key} style={{ background:T.surface, borderRadius:10,
                                border:`1px solid ${trackCleared===trackTotal?track.border:T.border}`,
                                padding:"12px 14px", boxShadow:T.cardShadow }}>
                    <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:8 }}>
                      <span style={{ fontSize:16 }}>{track.icon}</span>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:9, fontWeight:700, letterSpacing:"0.08em",
                          color:trackCleared===trackTotal?track.color:T.sub }}>{track.label}</div>
                        <div style={{ fontSize:8, color:T.muted }}>{trackCleared}/{trackTotal} levels</div>
                      </div>
                    </div>
                    <div style={{ display:"flex", gap:3, justifyContent:"center" }}>
                      {track.levels.map(lv=>{
                        const u=tUnlocked.has(lv.id), c=tCleared.has(lv.id);
                        const pass=lv.skills.filter(s=>getEffectiveScore(viewScores[s.id])>=lv.passScore).length;
                        return (
                          <div key={lv.id} style={{ textAlign:"center", opacity:u?1:0.4 }}>
                            <Ring value={pass} max={lv.skills.length}
                              color={c?track.color:u?T.silver:T.lockedTxt} size={42} stroke={4} label={`L${lv.id}`}/>
